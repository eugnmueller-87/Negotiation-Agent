# Railway deploy config for the Peitho v2 negotiation backend.
# Deploy: connect this repo in Railway, set the env vars (see docs/DEPLOY.md),
# and Railway builds with Nixpacks and runs the start command below.

[build]
builder = "nixpacks"
# Build is defined in nixpacks.toml: it installs runtime deps from
# requirements-deploy.txt (no package build) to sidestep the src-layout wheel issue.

[deploy]
# Run uvicorn against src/ on PYTHONPATH — the package isn't installed in the
# container, only its deps (see nixpacks.toml). Must match nixpacks.toml's start.
startCommand = "PYTHONPATH=src uvicorn negotiation_agent.api:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
