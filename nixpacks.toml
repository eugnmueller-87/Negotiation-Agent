# Nixpacks build plan for the Peitho v2 backend.
#
# WHY THIS EXISTS: Nixpacks auto-detects a Python project from pyproject.toml and
# generates an install phase that copies ONLY pyproject.toml, then runs
# `pip install .` — which fails ("egg_base 'src' does not exist", "README.md
# cannot be found") because the src-layout source tree, README, and LICENSE aren't
# in that layer yet.
#
# THE FIX: don't install the package at all. Install the runtime deps from
# requirements-deploy.txt (Nixpacks handles a requirements file reliably), and run
# uvicorn against the source directly with PYTHONPATH=src. This sidesteps the whole
# src-layout wheel-build. The package is still pip-installable locally / in CI via
# pyproject.toml; this file only governs the Railway container.

providers = ["python"]

[phases.setup]
nixPkgs = ["python3", "gcc"]

# Replace Nixpacks' auto `pip install .` with a plain requirements install — no
# package build, so src/, README, and LICENSE being absent from this layer is fine.
[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements-deploy.txt",
]

[start]
cmd = "PYTHONPATH=src /opt/venv/bin/uvicorn negotiation_agent.api:app --host 0.0.0.0 --port $PORT"
