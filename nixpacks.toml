# Nixpacks build plan for the Peitho v2 backend.
#
# WHY: Nixpacks' auto-detected Python install copies ONLY pyproject.toml then runs
# `pip install .`, which fails on this src-layout before the source is copied
# ("egg_base 'src' does not exist"). We bypass the package build entirely: install
# runtime deps from requirements.txt (which Nixpacks stages into the install layer)
# and run uvicorn against src/ on PYTHONPATH. The package stays pip-installable
# locally / in CI via pyproject.toml; this file only governs the Railway container.

providers = ["python"]

[phases.setup]
nixPkgs = ["python3", "gcc"]

# Override the auto install: create the venv and install deps from requirements.txt
# only — no package build, so the src tree being absent from this layer is fine.
[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
]

[start]
cmd = "PYTHONPATH=src /opt/venv/bin/uvicorn negotiation_agent.api:app --host 0.0.0.0 --port $PORT"
