<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peitho — autonomous procurement negotiation</title>
<style>
  :root{
    --paper:#f6f4ef; --surface:#fffdf9; --surface-2:#efece4; --line:#e2ddd1;
    --ink:#1a1813; --ink-2:#57534a; --ink-3:#8c877b;
    --buyer:#2a78d6; --supplier:#c9541f; --good:#2f7d4f; --warn:#b7791f; --crit:#c4392f;
    --chart-grid:#e7e2d6; --chart-axis:#b8b2a4;
    --serif:'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono','Consolas',monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#14130e; --surface:#1c1a14; --surface-2:#24211a; --line:#322e25;
      --ink:#f1eee4; --ink-2:#c3bdb0; --ink-3:#8b8577;
      --buyer:#5b9cea; --supplier:#e8875a; --good:#5fc088; --warn:#e0b455; --crit:#e8776b;
      --chart-grid:#2a2720; --chart-axis:#4a463b; }
  }
  :root[data-theme="dark"]{ --paper:#14130e; --surface:#1c1a14; --surface-2:#24211a; --line:#322e25;
    --ink:#f1eee4; --ink-2:#c3bdb0; --ink-3:#8b8577;
    --buyer:#5b9cea; --supplier:#e8875a; --good:#5fc088; --warn:#e0b455; --crit:#e8776b;
    --chart-grid:#2a2720; --chart-axis:#4a463b; }
  :root[data-theme="light"]{ --paper:#f6f4ef; --surface:#fffdf9; --surface-2:#efece4; --line:#e2ddd1;
    --ink:#1a1813; --ink-2:#57534a; --ink-3:#8c877b;
    --buyer:#2a78d6; --supplier:#c9541f; --good:#2f7d4f; --warn:#b7791f; --crit:#c4392f;
    --chart-grid:#e7e2d6; --chart-axis:#b8b2a4; }

  *{box-sizing:border-box;} html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{margin:0;font-family:var(--serif);font-weight:600;letter-spacing:-.01em;text-wrap:balance;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;color:inherit;}
  svg{display:inline-block;vertical-align:middle;}
  :focus-visible{outline:2px solid var(--buyer);outline-offset:2px;border-radius:5px;}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }

  /* header */
  header{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line);
    background:var(--surface);position:sticky;top:0;z-index:30;}
  .brand{display:flex;align-items:baseline;gap:11px;}
  .brand b{font-family:var(--serif);font-size:20px;letter-spacing:-.02em;}
  .brand span{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.03em;}
  .hspace{flex:1;}
  .hstat{font-size:11.5px;font-family:var(--mono);color:var(--ink-3);display:flex;align-items:center;gap:7px;}
  .hstat .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3);}
  .hstat.live .dot{background:var(--good);box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 22%,transparent);}
  .iconbtn{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;
    font-size:12.5px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;}
  .iconbtn:hover{color:var(--ink);}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 90px;}

  /* buttons */
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;}
  .btn.primary{background:var(--buyer);color:#fff;}
  .btn.primary:hover:not(:disabled){filter:brightness(1.07);}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line);}
  .btn.ghost:hover:not(:disabled){color:var(--ink);}
  .btn:disabled{opacity:.45;cursor:default;}
  .btn.big{padding:12px 22px;font-size:15px;}

  /* ── SETUP ─────────────────────────────────────────────── */
  .setup{max-width:720px;margin:0 auto;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .setup h1{font-size:31px;line-height:1.12;margin:12px 0 14px;}
  .lede{font-size:16px;color:var(--ink-2);line-height:1.55;max-width:60ch;}
  .lede b{color:var(--ink);font-weight:600;}
  .modenote{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;
    color:var(--ink-3);margin-top:16px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);}
  .modenote .dot{width:7px;height:7px;border-radius:50%;background:var(--warn);}
  .modenote.live .dot{background:var(--good);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px;}
  .fld{display:flex;flex-direction:column;gap:6px;} .fld.wide{grid-column:1/-1;}
  .fld label{font-size:12px;font-weight:600;color:var(--ink-2);}
  .fld label i{font-weight:400;color:var(--ink-3);font-style:normal;}
  .in{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);
    color:var(--ink);font-size:14px;font-family:inherit;}
  .in:focus{outline:2px solid var(--buyer);outline-offset:1px;}

  .personas{display:flex;gap:10px;flex-wrap:wrap;}
  .persona{flex:1;min-width:150px;text-align:left;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
  .persona b{font-size:13.5px;} .persona span{font-size:11.5px;color:var(--ink-3);}
  .persona.on{border-color:var(--supplier);background:color-mix(in srgb,var(--supplier) 10%,transparent);}
  .startrow{margin-top:26px;display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
  .startrow .meta{font-size:12.5px;color:var(--ink-3);}

  /* setup panels (emphasis / terms / supplier) */
  .panel{margin-top:20px;border:1px solid var(--line);border-radius:12px;background:var(--surface);padding:15px 18px;}
  .panel-hd{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:650;color:var(--ink);}
  .panel-hd svg{color:var(--buyer);}
  .panel-sub{font-weight:400;font-size:11.5px;color:var(--ink-3);flex-basis:100%;margin-top:3px;margin-left:24px;line-height:1.45;}
  .sliders{margin-top:12px;display:flex;flex-direction:column;gap:11px;}
  .slider{display:grid;grid-template-columns:130px 1fr 46px;gap:12px;align-items:center;}
  .slider label{font-size:12.5px;color:var(--ink-2);font-weight:600;}
  .slider .wval{text-align:right;font-size:12.5px;color:var(--buyer);font-weight:600;}
  .range{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--surface-2);outline:none;}
  .range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--buyer);
    cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .range::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--buyer);cursor:pointer;border:2px solid var(--surface);}
  .termchips{margin-top:12px;display:flex;flex-wrap:wrap;gap:9px;}
  .termchip{font-size:12.5px;padding:7px 12px;border-radius:9px;border:1px solid var(--line);
    display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);color:var(--ink-2);}
  .termchip.fixed{background:color-mix(in srgb,var(--buyer) 10%,transparent);border-color:color-mix(in srgb,var(--buyer) 30%,transparent);color:var(--buyer);font-weight:600;}
  .termchip.toggle{cursor:pointer;} .termchip.toggle svg{color:var(--ink-3);}
  .termchip.toggle.on{background:color-mix(in srgb,var(--good) 12%,transparent);border-color:color-mix(in srgb,var(--good) 34%,transparent);color:var(--good);font-weight:600;}
  .termchip.toggle.on svg{color:var(--good);}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:3px;}
  .segbtn{border:none;background:none;border-radius:6px;padding:7px 14px;font-size:12.5px;color:var(--ink-2);}
  .segbtn.on{background:var(--buyer);color:#fff;font-weight:600;}

  /* contract intelligence panel */
  .intel{margin-top:20px;border:1px solid var(--line);border-radius:14px;background:var(--surface);
    padding:16px 18px;box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .intel-hd{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px;}
  .intel-hd b{font-size:15px;display:block;} .intel-hd span{font-size:12.5px;color:var(--ink-3);line-height:1.5;display:block;margin-top:2px;}
  .intel-ta{width:100%;min-height:90px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
    color:var(--ink);font-family:var(--mono);font-size:12.5px;padding:10px 12px;resize:vertical;line-height:1.5;}
  .intel-row{display:flex;align-items:center;gap:11px;margin-top:11px;flex-wrap:wrap;}
  .intel-research{font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .intel-err{color:var(--crit);font-size:12.5px;}
  .spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .intel-out{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .intel-sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:14px 0 9px;}
  .intel-sec-lbl:first-child{margin-top:0;}
  .sec-sub{text-transform:none;letter-spacing:0;color:var(--ink-3);font-weight:400;}
  .intel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px 16px;}
  .ip{display:flex;flex-direction:column;gap:2px;font-size:12.5px;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .ipk{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .ipv b{font-weight:600;} .ipv .unk{color:var(--ink-3);}
  .asr{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
  .asr-confirmed{background:color-mix(in srgb,var(--good) 15%,transparent);color:var(--good);}
  .asr-probable{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);}
  .asr-unknown{background:var(--surface-2);color:var(--ink-3);}
  .intel-risk{margin-top:12px;font-size:12.5px;color:var(--ink-2);display:flex;gap:10px;flex-wrap:wrap;padding:9px 12px;background:var(--surface-2);border-radius:9px;}
  .risk-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .intel-block{margin-top:12px;padding:12px 14px;border:1.5px solid var(--crit);border-radius:10px;
    background:color-mix(in srgb,var(--crit) 8%,transparent);color:var(--crit);font-size:13px;font-weight:600;}

  .adjs{display:flex;flex-direction:column;gap:8px;}
  .adj{display:flex;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);border-left:3px solid var(--line);}
  .adj-give{border-left-color:var(--good);} .adj-hold{border-left-color:var(--buyer);} .adj-hedge{border-left-color:var(--warn);}
  .adj-check{padding-top:2px;} .adj-check input{width:16px;height:16px;accent-color:var(--buyer);cursor:pointer;}
  .adj-body{flex:1;}
  .adj-top{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .adj-rule{font-family:var(--mono);font-size:11px;color:var(--ink-2);font-weight:600;}
  .adj-role{font-family:var(--mono);font-size:9.5px;padding:1px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;}
  .adj-role-give{background:color-mix(in srgb,var(--good) 15%,transparent);color:var(--good);}
  .adj-role-hold{background:color-mix(in srgb,var(--buyer) 15%,transparent);color:var(--buyer);}
  .adj-role-hedge{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);}
  .adj-rat{font-size:12.5px;color:var(--ink-2);line-height:1.5;}
  .intel-apply{margin-top:13px;display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
  .intel-apply .meta{font-size:12px;color:var(--ink-3);}
  .intel-none{margin-top:12px;font-size:12.5px;color:var(--ink-3);padding:10px 13px;background:var(--surface-2);border-radius:9px;}

  /* ── MANDATE CARD ──────────────────────────────────────── */
  .mandate{border:1px solid var(--line);border-radius:14px;background:var(--surface);
    box-shadow:0 1px 0 rgba(0,0,0,.02);overflow:hidden;margin-bottom:22px;}
  .mandate .seal{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--buyer) 6%,transparent),transparent);}
  .mandate .seal .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .mandate .seal h3{font-size:16px;}
  .mandate .body{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px 26px;}
  .mrow{display:flex;flex-direction:column;gap:3px;}
  .mrow .k{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
  .mrow .v{font-size:14px;font-weight:600;}
  .mrow .v .mono{font-weight:600;}
  .emphasis{display:flex;gap:5px;align-items:center;margin-top:3px;}
  .edot{width:8px;height:8px;border-radius:50%;background:var(--line);}
  .edot.on{background:var(--buyer);}
  .mfoot{grid-column:1/-1;border-top:1px solid var(--line);padding-top:12px;display:flex;
    justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
    font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .mfoot .sig{color:var(--ink-2);}

  /* ── RUN transport + tabs ──────────────────────────────── */
  .transport{display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap;}
  .tabs{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;}
  .tab{border:none;background:none;border-radius:7px;padding:7px 13px;font-size:12.5px;color:var(--ink-2);
    display:inline-flex;align-items:center;gap:6px;}
  .tab.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .turnhint{font-size:12px;font-family:var(--mono);color:var(--ink-3);margin-left:auto;}
  .turnhint.err{color:var(--crit);}

  /* panes */
  .stage{display:grid;grid-template-columns:1fr 300px;gap:16px;}
  @media(max-width:820px){.stage{grid-template-columns:1fr;}}
  .thread-wrap{border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden;
    display:flex;flex-direction:column;min-height:440px;}
  .thread-head{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--surface-2);
    display:flex;align-items:center;gap:10px;}
  .thread-head .who{font-weight:650;font-size:14px;}
  .thread-head .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 8px;border-radius:5px;}
  .thread-head .sub{font-size:11.5px;color:var(--ink-3);margin-left:auto;}
  .thread{padding:6px 18px 18px;overflow-y:auto;max-height:560px;flex:1;}
  .empty{color:var(--ink-3);text-align:center;padding:60px 20px;font-size:14px;}

  /* email message */
  .msg{padding:16px 0;border-bottom:1px solid var(--line);}
  .msg:last-child{border-bottom:none;}
  .msg-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
  .avatar.buyer{background:var(--buyer);} .avatar.supplier{background:var(--supplier);}
  .msg-from{font-weight:650;font-size:13.5px;}
  .msg-meta{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);}
  .msg-body{border-left:3px solid var(--line);padding:2px 0 2px 15px;margin-left:8px;
    white-space:pre-wrap;font-size:14px;color:var(--ink);line-height:1.6;}
  .msg.buyer .msg-body{border-left-color:var(--buyer);}
  .msg.supplier .msg-body{border-left-color:var(--supplier);}
  .msg-sig{margin-top:9px;padding-left:23px;font-size:11.5px;color:var(--ink-3);font-style:italic;}

  .skel{padding:16px 0;border-bottom:1px solid var(--line);}
  .skel .line{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--surface-2),var(--line),var(--surface-2));
    background-size:200% 100%;animation:shimmer 1.3s infinite;margin:8px 0;}
  @keyframes shimmer{to{background-position:-200% 0;}}

  /* reasoning drawer */
  .drawer{margin:10px 0 2px 23px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);overflow:hidden;}
  .drawer summary{list-style:none;cursor:pointer;padding:9px 13px;font-size:12px;font-family:var(--mono);
    color:var(--ink-2);display:flex;align-items:center;gap:8px;}
  .drawer summary::-webkit-details-marker{display:none;}
  .drawer summary .chev{transition:transform .15s;}
  .drawer[open] summary .chev{transform:rotate(90deg);}
  .drawer .content{padding:0 13px 13px;}
  .dsec{border-top:1px solid var(--line);padding:11px 0;}
  .dsec:first-child{border-top:none;}
  .dsec .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
  .drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
  .drow .mono{color:var(--ink);}
  .trade{font-size:12.5px;color:var(--ink-2);line-height:1.5;}
  .bars{margin-top:9px;display:flex;flex-direction:column;gap:6px;}
  .bar{display:grid;grid-template-columns:96px 1fr auto;gap:9px;align-items:center;font-size:11.5px;}
  .bar .track{height:6px;background:var(--surface);border-radius:4px;overflow:hidden;}
  .bar .fill{height:100%;background:var(--buyer);border-radius:4px;}
  .chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .chip{font-family:var(--mono);font-size:11px;background:color-mix(in srgb,var(--buyer) 14%,transparent);
    color:var(--buyer);padding:2px 8px;border-radius:5px;}
  .chiplbl{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);}

  /* consulted knowledge base — the KB made visible, like give/get */
  .kbchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .kbchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:6px;
    background:color-mix(in srgb,var(--accent,#7c5cff) 10%,transparent);
    color:color-mix(in srgb,var(--accent,#7c5cff) 78%,var(--ink));
    border:1px solid color-mix(in srgb,var(--accent,#7c5cff) 26%,transparent);}
  .kbchip svg{opacity:.8;}
  .kbnote{font-size:11px;color:var(--ink-3);margin-top:7px;line-height:1.45;}

  /* give/get — the collaborative trade, visible on the counter itself */
  .giveget{margin:9px 0 2px 23px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
  .gg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 10px;border-radius:7px;
    border:1px solid transparent;}
  .gg .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}
  .gg .v{font-family:var(--mono);}
  .gg.give{background:color-mix(in srgb,var(--good) 10%,transparent);color:var(--good);
    border-color:color-mix(in srgb,var(--good) 28%,transparent);}
  .gg.get{background:color-mix(in srgb,var(--buyer) 11%,transparent);color:var(--buyer);
    border-color:color-mix(in srgb,var(--buyer) 28%,transparent);}
  .gg-arrow{color:var(--ink-3);font-size:12px;}

  /* the guard hero */
  .guard-ok{margin-top:4px;font-size:12px;color:var(--good);display:flex;align-items:center;gap:7px;}
  .guard-reject{margin-top:4px;}
  .rej-draft{font-size:12.5px;color:var(--ink-3);text-decoration:line-through;
    text-decoration-color:var(--crit);text-decoration-thickness:1.5px;padding:8px 11px;

    opacity:0;pointer-events:none;transition:opacity .2s;}
  .toast.show{opacity:1;}

<script>
"use strict";
/* ══ Peitho v2 — thin client over the live deterministic backend ══════════
   The browser holds NO engine. It sends the signed mandate + transcript to
   /negotiate/open and /step; the server decides, drafts, guards, and returns
   the buyer message + reasoning. Every number on screen is server-computed. */

const $ = (s,r=document)=>r.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Same-origin when served from the backend; falls back to the deployed URL when
// opened as a local file so the demo works either way.
const API = (location.protocol === "file:" || !location.host)
  ? "https://web-production-a5b7b.up.railway.app"
  : "";

const PERSONAS = [
  {id:"cooperative", label:"Cooperative", hint:"concedes early, seeks a fair middle"},
  {id:"aggressive", label:"Aggressive",  hint:"holds firm, concedes late"},
  {id:"evasive",    label:"Evasive",     hint:"stalls, defers, avoids numbers"},
];

const TERM_LABELS = {price:"Unit price", payment_days:"Payment terms", contract_months:"Contract length",
  rebate_pct:"Rebate %", volume_units:"Annual volume"};
function fmtTerm(name, x){
  if(x==null) return "—";
  if(name==="price") return "€"+Number(x).toFixed(2);
  if(name==="payment_days") return "net-"+Math.round(x);
  if(name==="contract_months") return Math.round(x)+" mo";
  if(name==="rebate_pct") return Number(x).toFixed(1)+"%";
  if(name==="volume_units") return Math.round(x).toLocaleString('en')+" units";
  return String(x);
}

const M = {
  phase:"setup",
  form:{
    supplier:"Nordwerk Verpackung GmbH", category:"Corrugated packaging — annual supply",
    target:92, floor:108, paymentLever:60, contractMax:24, persona:"aggressive",
    // editable weights (emphasis) — 0..100 each; normalised across ENABLED terms only
    wPrice:50, wPayment:25, wContract:25, wRebate:20, wVolume:20,
    // optional terms off by default
    rebateOn:false, volumeOn:false,
    // supplier controls
    supplierOpen:109, concession:"medium",  // slow | medium | fast
  },
  session:null, signed:null, transcript:[], thread:[], turns:[],
  tab:"buyer", busy:false, status:"live", terminal:false, error:null, convergence:[],
  // contract intelligence
  intel:{ open:false, busy:false, text:"", result:null, accepted:{}, error:null, applied:false },
};

// Every negotiable term the demo can put on the table. `weightKey` maps to M.form.
const TERM_DEFS = [
  {name:"price", type:"price", dir:"minimize", label:"Unit price", weightKey:"wPrice", always:true,
    best:f=>+f.target, worst:f=>+f.floor, appetite:0.15},
  {name:"payment_days", type:"payment_days", dir:"maximize", label:"Payment terms", weightKey:"wPayment", always:true,
    best:f=>+f.paymentLever, worst:()=>30, appetite:0.85},
  {name:"contract_months", type:"contract_months", dir:"minimize", label:"Contract length", weightKey:"wContract", always:true,
    best:()=>12, worst:f=>+f.contractMax, appetite:0.70},
  {name:"rebate_pct", type:"rebate_pct", dir:"maximize", label:"Rebate %", weightKey:"wRebate", toggle:"rebateOn",
    best:()=>8, worst:()=>0, appetite:0.55},
  {name:"volume_units", type:"volume_units", dir:"minimize", label:"Annual volume", weightKey:"wVolume", toggle:"volumeOn",
    best:()=>10000, worst:()=>50000, appetite:0.60},
];
function activeTerms(){ return TERM_DEFS.filter(t => t.always || M.form[t.toggle]); }

/* ── backend calls ── */
async function post(path, body){
  const r = await fetch(API+path, {
    method:"POST", headers:{"Content-Type":"application/json","X-Peitho-Godview":"1"},
    body:JSON.stringify(body),
  });
  const data = await r.json().catch(()=>({error:{code:"bad_response",message:"unreadable response"}}));
  if(!r.ok) throw Object.assign(new Error(data?.error?.message||"request failed"), {code:data?.error?.code, status:r.status});
  return data;
}

function buildMandate(){
  const f = M.form;
  const terms = activeTerms();
  const rawSum = terms.reduce((s,t)=>s + Math.max(0.01, +f[t.weightKey]), 0);
  const envTerms = terms.map(t=>({
    name:t.name, term_type:t.type, direction:t.dir,
    best:t.best(f), worst:t.worst(f),
    weight: Math.max(0.01, +f[t.weightKey]) / rawSum,   // normalised across active terms
  }));
  const appetite = {}; terms.forEach(t=>appetite[t.name]=t.appetite);
  return {
    envelope:{
      negotiation_id:"neg-"+M.session, version:1, signed_by:"e.mueller (demo)",
      target_utility:(M.shapedTarget??0.90), reservation_utility:(M.shapedReservation??0.60), terms:envTerms,
    },
    supplier_appetite:appetite,
    config:{max_rounds:6, beta:2.5, stall_rounds:3, on_unknown_terms:"escalate"},
  };
}
function normalizedWeights(){
  const f=M.form, terms=activeTerms();
  const raw = terms.reduce((s,t)=>s+Math.max(0.01,+f[t.weightKey]),0);
  return Object.fromEntries(terms.map(t=>[t.name, Math.max(0.01,+f[t.weightKey])/raw]));
}

/* scripted supplier that concedes by persona — the browser plays the counterparty
   so the demo is self-contained; the ENGINE (buyer) is the real thing on the server.
   Returns {text, terms} so step() uses the exact offer, not a brittle re-parse. */
function supplierMove(persona, round){
  const f = M.form;
  // concession pace blends the persona with the user's chosen pace
  const paceMul = {slow:0.6, medium:1.0, fast:1.5}[f.concession] ?? 1.0;
  const speed = ({cooperative:0.42, aggressive:0.20, evasive:0.28}[persona]) * paceMul;
  const frac = Math.min(1, speed*(round+1));

  // price: opens at supplierOpen, concedes toward the buyer's target (won't go below)
  const pOpen = +f.supplierOpen, pFloor = +f.target;
  const price = Math.round(Math.max(pFloor, pOpen - (pOpen-pFloor)*frac)*100)/100;
  // payment: cooperative extends toward the lever; others hold near net-30
  const pay = persona==="cooperative" ? Math.min(45+round*4, +f.paymentLever) : (persona==="evasive"?30:30);
  // contract: cooperative shortens toward 12; others hold the max
  const con = persona==="cooperative" ? Math.max(12, +f.contractMax-round*3) : +f.contractMax;

  const terms = {price, payment_days:pay, contract_months:con};
  // optional terms, if enabled — supplier gives ground slowly
  if(f.rebateOn) terms.rebate_pct = Math.round(Math.min(8, frac*4)*10)/10;
  if(f.volumeOn) terms.volume_units = Math.round(Math.max(10000, 50000 - frac*40000));

  // build a message that states every ACTIVE term in extractor-safe phrasing
  // (space before "months"; "net-N"; "N%"; "N units") so the server parses a full offer.
  const parts = [`€${price.toFixed(2)} per unit`, `net-${pay}`, `${con} months`];
  if(f.rebateOn) parts.push(`${terms.rebate_pct}% rebate`);
  if(f.volumeOn) parts.push(`${terms.volume_units.toLocaleString('en')} units`);
  const list = parts.slice(0,-1).join(", ")+", and "+parts.slice(-1);
  const lead = {
    cooperative:"Appreciate the dialogue — to keep this moving I can come to",
    aggressive:"I hear you, but this is about as far as I can stretch:",
    evasive:"Let me take this back to my team — provisionally I could look at",
  }[persona];
  const tail = {cooperative:" Let's find the middle here.", aggressive:" Margins are thin.", evasive:", though I'd want to confirm internally."}[persona];
  return { text:`${lead} ${list}.${tail}`, terms };
}

/* ══ RENDER ══════════════════════════════════════════════════════════════ */
const app = $("#app");
function render(){ app.innerHTML = M.phase==="setup" ? setupView() : runView();
  if(M.phase==="setup") bindSetup(); else bindRun();
  for(const id of ["threadBuyer","threadSupplier"]){ const el=$("#"+id); if(el) el.scrollTop=el.scrollHeight; }
}

/* theme */
(function(){ const mq=matchMedia("(prefers-color-scheme: dark)");
  let t = mq.matches?"dark":"light";
  const ap=x=>document.documentElement.setAttribute("data-theme",x);
  ap(t);
  $("#themeBtn").onclick=()=>{ t=(document.documentElement.getAttribute("data-theme")==="dark")?"light":"dark"; ap(t); };
})();
$("#homeBtn").onclick=()=>{ if(M.phase!=="setup"){ M.phase="setup"; render(); } };

/* ── setup view ── */
function setupView(){
  const f=M.form;
  return `<div class="setup">
    <div class="eyebrow">the deterministic negotiator</div>
    <h1>The model advises. The engine decides.</h1>
    <p class="lede">A real procurement negotiation runs on the server: a deterministic engine
      makes every accept / counter / walk-away call and fixes the exact figures a reply may state.
      A language model writes the emails — and <b>cannot state a number the engine didn't approve</b>.
      You watch it happen, including the moment the guard rejects a draft.</p>
    <div class="modenote" id="modenote"><span class="dot"></span><span id="modenoteText">checking backend…</span></div>

    ${sectionIntel()}

    <div class="grid">
      ${field("Supplier","legal counterparty",`<input class="in" id="f-supplier" value="${esc(f.supplier)}">`)}
      ${field("Category","",`<input class="in" id="f-category" value="${esc(f.category)}">`)}
      ${field("Target price (€/unit)","the aspiration",`<input class="in" type="number" step="0.5" id="f-target" value="${f.target}">`)}
      ${field("Walk-away floor (€/unit)","never cross this",`<input class="in" type="number" step="0.5" id="f-floor" value="${f.floor}">`)}
      ${field("Payment lever (max net-days)","a term to trade",`<input class="in" type="number" id="f-paymentLever" value="${f.paymentLever}">`)}
      ${field("Max contract length (months)","",`<input class="in" type="number" id="f-contractMax" value="${f.contractMax}">`)}
    </div>

    ${sectionEmphasis()}
    ${sectionTerms()}
    ${sectionSupplier()}

    <div class="startrow">
      <button class="btn primary big" id="startBtn"><svg width="16" height="16"><use href="#i-seal"/></svg> Sign the mandate &amp; open</button>
      <span class="meta">target €${(+f.target).toFixed(2)} · floor €${(+f.floor).toFixed(2)} · ${activeTerms().length} terms on the table</span>
    </div>
  </div>`;
}

function sectionIntel(){
  const it=M.intel;
  const sample = `SUPPLY AGREEMENT

Supplier: Nordwerk Verpackung GmbH
Category: Corrugated packaging

1. Price. The unit price shall be €11.50 per unit.
2. Payment. Invoices are payable net-30 days.
3. Term. This agreement expires 2026-08-15 unless renewed.
4. Volume. Minimum annual volume: 40,000 units.
5. Confidentiality. Both parties enter a mutual non-disclosure agreement.`;
  return `<div class="intel">
    <div class="intel-hd">
      <svg width="17" height="17" style="color:var(--buyer)"><use href="#i-seal"/></svg>
      <div><b>Walk in prepared</b>
        <span>Paste the current/expiring contract — the agent extracts the deal, researches the supplier, and proposes how the intelligence should shape your mandate. You approve every change.</span></div>
    </div>
    <textarea class="intel-ta" id="intelText" placeholder="Paste contract text…">${esc(it.text)}</textarea>
    <div class="intel-row">
      <button class="btn primary" id="intelReadBtn" ${it.busy?"disabled":""}>${it.busy?'<span class="spin"></span> Reading…':'📄 Read the contract'}</button>
      <button class="btn ghost" id="intelSampleBtn">load a sample</button>
      <label class="intel-research"><input type="checkbox" id="intelResearch" checked> research supplier (Hades)</label>
      ${it.error?`<span class="intel-err">⚠ ${esc(it.error)}</span>`:""}
    </div>
    ${it.result?intelResult(it.result):""}
    <input type="hidden" id="intelSample" value="${esc(sample).replace(/"/g,'&quot;')}">
  </div>`;
}

function intelResult(r){
  const i=r.intelligence, ext=i.extraction;
  const life=i.lifecycle||{};
  const legal=i.legal||{};
  const grounded=(g,fmt)=> g&&g.value!=null ? `<b>${esc(fmt?fmt(g.value):g.value)}</b> <span class="asr asr-${g.assurance}">${g.assurance}</span>` : `<span class="unk">not detected</span>`;
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  const pic = [
    ["Supplier", ext.supplier_name?`<b>${esc(ext.supplier_name)}</b>`:`<span class="unk">—</span>`],
    ["Unit price", terms.price!=null?`<b>€${(+terms.price).toFixed(2)}</b>`:`<span class="unk">—</span>`],
    ["Payment", terms.payment_days!=null?`<b>net-${terms.payment_days}</b>`:`<span class="unk">—</span>`],
    ["Volume", terms.volume_units!=null?`<b>${(+terms.volume_units).toLocaleString('en')} units</b>`:`<span class="unk">—</span>`],
    ["Expiry", grounded(life.expiration_date)],
    ["NDA", grounded(legal.has_nda, v=>v==="true"?"in place ✓":"none")],
    ["DPA", grounded(legal.has_dpa, v=>v==="true"?"in place ✓":"none")],
    ["Units", i.units_of_measure&&i.units_of_measure.length?`<b>${i.units_of_measure.map(esc).join(", ")}</b>`:`<span class="unk">—</span>`],
  ];
  const brief=r.brief;
  const riskRow = brief ? `<div class="intel-risk">
    <span class="risk-lbl">Supplier risk (${brief.source==="sample"?"sample — not live":"Hades"})</span>
    <span>${esc(brief.risk_level||"—")} · ${esc(brief.recommendation||"—")} · sanctions ${brief.sanctioned?"⚠ match":"clear ✓"} · LkSG ${esc((brief.lksg_signal||"—").replace(/_/g," "))}</span>
  </div>` : (r.research_note?`<div class="intel-risk"><span class="risk-lbl">Supplier risk</span><span>${esc(r.research_note)}</span></div>`:"");

  const blocked = r.blocked ? `<div class="intel-block">⛔ ${esc(r.block_reason||"Supplier blocked — a human must clear this.")}</div>` : "";

  const adj = (r.adjustments||[]).map(a=>{
    const acc = M.intel.accepted[a.rule_id] !== false; // default accepted
    return `<div class="adj adj-${a.role}">
      <label class="adj-check"><input type="checkbox" data-rule="${esc(a.rule_id)}" ${acc?"checked":""} ${r.blocked?"disabled":""}></label>
      <div class="adj-body">
        <div class="adj-top"><span class="adj-rule">${esc(a.rule_id)}</span>
          <span class="adj-role adj-role-${a.role}">${a.role}</span></div>
        <div class="adj-rat">${esc(a.rationale)}</div>
      </div>
    </div>`;
  }).join("");

  return `<div class="intel-out">
    <div class="intel-sec-lbl">the commercial picture</div>
    <div class="intel-grid">${pic.map(([k,v])=>`<div class="ip"><span class="ipk">${k}</span><span class="ipv">${v}</span></div>`).join("")}</div>
    ${riskRow}
    ${blocked}
    ${(r.adjustments&&r.adjustments.length)?`<div class="intel-sec-lbl">proposed mandate adjustments <span class="sec-sub">the model found it · a rule moved it · you approve it</span></div>
      <div class="adjs">${adj}</div>
      <div class="intel-apply">
        <button class="btn primary" id="intelApplyBtn" ${r.blocked?"disabled":""}>Apply to mandate ↓</button>
        <span class="meta">${r.blocked?"cleared by a human before this unlocks":"writes the shaped target/floor/terms into the form below"}</span>
      </div>` : `<div class="intel-none">No mandate adjustments proposed — the contract looks clean. The extracted numbers are pre-filled below.</div>`}
  </div>`;
}

function sectionEmphasis(){
  const f=M.form, terms=activeTerms();
  const nw = normalizedWeights();

  app.querySelectorAll(".range").forEach(r=>r.oninput=()=>{

function bindIntel(){
  const ta=$("#intelText"); if(ta) ta.oninput=()=>{ M.intel.text=ta.value; };
  const sb=$("#intelSampleBtn"); if(sb) sb.onclick=()=>{ M.intel.text=$("#intelSample").value; render(); };
  const rb=$("#intelReadBtn"); if(rb) rb.onclick=readContract;
  // adjustment toggles → re-preview is deferred until "Apply"; just track acceptance
  app.querySelectorAll(".adj-check input").forEach(c=>c.onchange=()=>{ M.intel.accepted[c.dataset.rule]=c.checked; });
  const ab=$("#intelApplyBtn"); if(ab) ab.onclick=applyIntel;
}

async function readContract(){
  const text=(M.intel.text||"").trim();
  if(!text){ M.intel.error="paste a contract first"; render(); return; }
  M.intel.busy=true; M.intel.error=null; M.intel.result=null; M.intel.accepted={}; render();
  try{
    const research=$("#intelResearch") ? $("#intelResearch").checked : true;
    const res=await post("/intel", {contract_text:text, research});
    M.intel.result=res;
  }catch(e){ M.intel.error=e.message||"couldn't read the contract"; }
  finally{ M.intel.busy=false; render(); }
}

async function applyIntel(){
  const r=M.intel.result; if(!r || r.blocked) return;
  // build the current base envelope from the form, then reshape server-side
  const base=buildMandate().envelope;
  const accepted=(r.adjustments||[]).filter(a=>M.intel.accepted[a.rule_id]!==false).map(a=>a.rule_id);
  try{
    const res=await post("/reshape", {
      base_envelope:base, adjustments:r.adjustments,
      accepted_rule_ids:accepted, supplier_appetite:buildMandate().supplier_appetite,
    });
    writeShapedIntoForm(res.shaped_envelope, r);
    M.intel.applied=true;
    render();
    const el=document.querySelector(".grid"); if(el) el.scrollIntoView({behavior:"smooth"});
  }catch(e){
    M.intel.error = e.code==="mandate_conflict"
      ? "Those adjustments conflict — deselect one: "+(e.message||"")
      : (e.message||"couldn't apply");
    render();
  }
}

// map the server's shaped envelope back into the editable form (levers + emphasis + floors)
function writeShapedIntoForm(env, r){
  const i=r.intelligence, ext=i.extraction;
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  // pre-fill the negotiable numbers from the extracted contract
  if(terms.price!=null){ M.form.target=+terms.price; M.form.floor=Math.round((+terms.price*1.17)*100)/100; }
  if(terms.payment_days!=null) M.form.paymentLever=Math.max(M.form.paymentLever, +terms.payment_days);
  // enable optional terms the shaper added, set weights from the shaped envelope
  const byName=Object.fromEntries(env.terms.map(t=>[t.name,t]));
  if(byName.rebate_pct) M.form.rebateOn=true;
  if(byName.volume_units) M.form.volumeOn=true;
  const total=env.terms.reduce((s,t)=>s+t.weight,0);
  const setW=(name,key)=>{ if(byName[name]) M.form[key]=Math.round(byName[name].weight/total*100); };
  setW("price","wPrice"); setW("payment_days","wPayment"); setW("contract_months","wContract");
  setW("rebate_pct","wRebate"); setW("volume_units","wVolume");
  // the data-driven target/floor from the shaped mandate (replaces the hardcoded 0.9/0.6)
  M.shapedTarget=env.target_utility; M.shapedReservation=env.reservation_utility;
}

    <div class="msg-head">
      <div class="avatar ${cls}">${av}</div>

// The collaborative trade, made legible on the counter itself: what the agent GAVE
// (concessions, routed to low-weight terms) to GET / hold what it values. Data is the
// engine's own move_brief — no invented numbers. Hidden on the opening anchor & accepts.
function giveGetRow(turn){
  const b = turn.move_brief;
  if(!b || b.is_opening || b.outcome!=="COUNTER") return "";
  const moved = b.moved_terms||[];
  const gives = moved.filter(m=>m.role==="concession");
  const held = b.held_terms||[];
  if(!gives.length && !held.length) return "";

  const giveChips = gives.map(m=>`<span class="gg give" title="we moved on this to unlock the trade">
    <span class="k">gave</span><span class="v">${esc(TERM_LABELS[m.name]||m.name.replace(/_/g," "))} ${esc(m.from_display)} → ${esc(m.to_display)}</span></span>`).join("");
  const heldChips = held.map(h=>`<span class="gg get" title="held firm — the term we value">
    <span class="k">held</span><span class="v">${esc(TERM_LABELS[h.name]||h.name.replace(/_/g," "))} ${esc(h.display)}</span></span>`).join("");
  const arrow = (gives.length && held.length) ? `<span class="gg-arrow">→</span>` : "";
  return `<div class="giveget">${giveChips}${arrow}${heldChips}</div>`;
}

function reasonDrawer(turn){
  const oc = {accept:"var(--good)", counter:"var(--buyer)", escalate:"var(--warn)"}[turn.outcome];
  const intl = turn.internal;
  const decisionSec = intl ? `<div class="dsec"><div class="lab">engine internals · buyer-private</div>
    <div class="drow"><span>outcome</span><span class="mono" style="color:${oc}">${turn.outcome.toUpperCase()}</span></div>
    <div class="drow"><span>round</span><span class="mono">${turn.round_index} / 6</span></div>
    <div class="drow" title="Boulware: reservation + span·(1−(t/T)^β)"><span>threshold</span><span class="mono">${intl.threshold.toFixed(3)}</span></div>
    ${intl.incoming_utility!=null?`<div class="drow"><span>incoming utility</span><span class="mono">${intl.incoming_utility.toFixed(3)}</span></div>`:""}
    ${intl.counter_utility!=null?`<div class="drow"><span>counter utility</span><span class="mono">${intl.counter_utility.toFixed(3)}</span></div>`:""}
    <div class="drow"><span>reservation floor</span><span class="mono">${intl.reservation_utility.toFixed(3)}</span></div></div>` : "";

  const brief = turn.move_brief;
  const bars = Object.keys(turn.bar_fills||{}).length ? `<div class="bars">${
    Object.entries(turn.bar_fills).map(([k,v])=>`<div class="bar"><span>${esc(TERM_LABELS[k]||k)}</span>
      <span class="track"><span class="fill" style="width:${Math.round(v*100)}%"></span></span>
      <span class="mono" style="color:var(--ink-3)">${(v*100).toFixed(0)}%</span></div>`).join("")}</div>` : "";
  const chips = Object.keys(turn.approved_numbers||{}).length ? `<div class="chips"><span class="chiplbl">figures this reply may state →</span>${
    Object.entries(turn.approved_numbers).map(([k,v])=>`<span class="chip">${esc(fmtTerm(k,v))}</span>`).join("")}</div>` : "";
  const tradeSec = brief ? `<div class="dsec"><div class="lab">trade narrative</div>
    <div class="trade">${esc(briefSentence(brief))}</div>${bars}${chips}</div>` : "";

  const consulted = turn.consulted || [];
  const consultedSec = consulted.length ? `<div class="dsec"><div class="lab">consulted knowledge base</div>
    <div class="kbchips">${consulted.map(c=>`<span class="kbchip" title="${esc(c.tag)} · shaped framing only — not a source of figures">
      <svg width="11" height="11"><use href="#i-book"/></svg> ${esc(c.label)}</span>`).join("")}</div>
    <div class="kbnote">Real procurement knowledge + the Fisher-Ury framework shaped the framing. The guard still limits the figures.</div></div>` : "";

  const guardSec = `<div class="dsec"><div class="lab">the numeric guard</div>${guardBlock(turn.guard)}</div>`;

  return `<details class="drawer"${(turn.guard&&turn.guard.attempts&&turn.guard.attempts.length>1)?" open":""}>
    <summary><svg class="chev" width="13" height="13"><use href="#i-chev"/></svg> Why this move — and how the guard held it</summary>
    <div class="content">${decisionSec}${tradeSec}${consultedSec}${guardSec}</div></details>`;
}

function briefSentence(b){
  if(b.outcome==="ESCALATE") return "Escalating to a human buyer — no move made.";
  if(b.is_opening) return "Opening the negotiation with our target package.";
  if(b.outcome==="ACCEPT") return "Accepting — the supplier's offer clears our line.";
  if(b.moved_terms && b.moved_terms.length){
    const m=b.moved_terms[0];
    const held=(b.held_terms&&b.held_terms[0])?b.held_terms[0].name.replace(/_/g," "):"our priorities";
    return `Conceding ${m.name.replace(/_/g," ")} (${m.from_display} → ${m.to_display}) while holding ${held}. ${b.trade_axis?b.trade_axis.rationale:""}`;
  }
  return "Holding position; only minor adjustments this round.";
}

function guardBlock(guard){
  if(!guard || !guard.attempts || !guard.attempts.length)
    return `<div class="guard-ok"><svg width="14" height="14"><use href="#i-check"/></svg> every figure in the message is engine-approved</div>`;
  const rejected = guard.attempts.filter(a=>!a.ok);
  const sent = guard.attempts[guard.attempts.length-1];
  if(!rejected.length)
    return `<div class="guard-ok"><svg width="14" height="14"><use href="#i-check"/></svg> passed on the first draft — every figure is on the approved list</div>`;
  const r = rejected[0];
  const toks = (r.violations||[]).map(v=>`<span class="tok">${esc(v)}</span>`).join(" ");
  return `<div class="guard-reject">
    <div class="rej-draft">${esc(r.draft)}</div>
    <div class="rej-verdict"><svg width="13" height="13"><use href="#i-x"/></svg> guard rejected: ${toks} not on the approved list</div>
    <div class="rej-arrow">↓ the engine forced a redraft</div>
    <div class="sent-draft">${esc(sent.draft)}</div>
    <div class="guard-ok" style="margin-top:8px"><svg width="14" height="14"><use href="#i-check"/></svg> released only after every figure matched the allowlist</div>
  </div>`;
}

    <div style="font-size:12.5px;color:var(--ink-2);line-height:1.55">Every figure in a buyer email is drawn from the engine's approved-number allowlist. The model physically cannot emit an unapproved figure — a violating draft is rejected and redrafted server-side before it's ever sent.</div>

function convergenceCard(){
  return `<div class="card"><h3><svg width="13" height="13"><use href="#i-scale"/></svg> price convergence</h3>
    ${chartSVG()}

    <div class="chart-note">The buyer holds price near target while trading on payment terms — that's logrolling. Both prices converge over the rounds.</div>
  </div>`;
}

function chartSVG(){
  const pts = M.convergence;
  if(pts.length<1) return `<div style="font-size:12px;color:var(--ink-3);padding:20px 0">Step through rounds to build the chart.</div>`;
  const W=640, H=180, PL=44, PR=14, PT=12, PB=26;
  const xs = pts.map((_,i)=>i);
  const maxX = Math.max(1, xs.length-1);
  const allP = pts.flatMap(p=>[p.buyer, p.supplier]).filter(v=>v!=null);
  const lo = Math.min(...allP)-1, hi=Math.max(...allP)+1;
  const X = i => PL + (i/maxX)*(W-PL-PR);
  const Y = v => PT + (1-(v-lo)/(hi-lo))*(H-PT-PB);
  const line = (key,color)=>{
    const d = pts.map((p,i)=> (i===0?"M":"L")+X(i).toFixed(1)+" "+Y(p[key]).toFixed(1)).join(" ");
    const dots = pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p[key]).toFixed(1)}" r="3" fill="${color}"/>`).join("");
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round"/>${dots}`;
  };
  const grid = [0,0.5,1].map(t=>{const y=PT+t*(H-PT-PB); const val=(hi-(t*(hi-lo))).toFixed(0);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--chart-grid)" stroke-width="1"/>
      <text x="${PL-8}" y="${y+3.5}" text-anchor="end" font-size="10" fill="var(--chart-axis)" font-family="var(--mono)">€${val}</text>`;}).join("");
  const xlab = pts.map((_,i)=>`<text x="${X(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--chart-axis)" font-family="var(--mono)">r${i+1}</text>`).join("");
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:420px;display:block">
    ${grid}${xlab}${line("supplier","var(--supplier)")}${line("buyer","var(--buyer)")}</svg></div>`;
}

function banner(){
  const closed = M.status==="closed";
  const last = [...M.turns].reverse()[0];
  return `<div class="banner ${closed?"":"escalated"}">
    <svg width="26" height="26" style="color:${closed?"var(--good)":"var(--warn)"}"><use href="#i-${closed?"check":"x"}"/></svg>
    <div style="flex:1;min-width:220px">
      <div class="t">${closed?"Agreement reached":"Escalated to a human buyer"}</div>
      <div class="d">${closed
        ? `Final package: ${last?Object.entries(last.approved_numbers).map(([k,v])=>fmtTerm(k,v)).join(" · "):"—"}. Every quoted figure is engine-approved and replayable from the transcript.`
        : `The engine reached its reservation floor without a clearing offer and handed off — exactly where a human should take over. It never conceded past the floor.`}</div>
    </div>
    <button class="btn ghost" id="againBtn">New negotiation</button>
  </div>`;
}

function bindRun(){
  const s=$("#stepBtn"); if(s) s.onclick=()=>step();
  const a=$("#autoBtn"); if(a) a.onclick=autoplay;
  const ag=$("#againBtn"); if(ag) ag.onclick=()=>{ M.phase="setup"; render(); };
  app.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{ M.tab=b.dataset.tab; render(); });
}

/* ══ negotiation loop ══════════════════════════════════════════════════════ */
async function start(){
  M.session = "s"+Math.random().toString(36).slice(2,10);
  M.transcript=[]; M.thread=[]; M.turns=[]; M.convergence=[];
  M.terminal=false; M.status="live"; M.error=null; M.tab="buyer"; M.busy=true;
  M.phase="running"; render();
  try{
    const mandate = buildMandate();
    const res = await post("/negotiate/open", {mandate, session_id:M.session});
    M.signed = res.signed_mandate;
    pushTurn(res.turn, /*round*/0);
  }catch(e){ M.error = e.message; }
  finally{ M.busy=false; render(); }
}

function pushTurn(turn, round){
  M.thread.push({from:"buyer", text:turn.buyer_message, round, turn});
  M.turns.push(turn);
  recordConvergence();
}

function recordConvergence(){
  // buyer price = last approved price; supplier price = last supplier offer parsed
  const lastBuyer = [...M.turns].reverse().find(t=>t.approved_numbers && t.approved_numbers.price!=null);
  const lastSupOffer = [...M.transcript].reverse()[0];
  M.convergence.push({
    buyer: lastBuyer ? lastBuyer.approved_numbers.price : null,
    supplier: lastSupOffer ? lastSupOffer.terms.price : (M.form.floor+1),
  });
}

async function step(){
  if(M.busy || M.terminal) return;
  M.busy=true; M.error=null;

  const round = M.turns.length; // 1,2,3...
  const move = supplierMove(M.form.persona, round-1);
  const supText = move.text;
  const offerTerms = move.terms; // exact terms the message states — no brittle re-parse

  // Show the supplier's message immediately (with a thinking skeleton for the reply),
  // but DON'T commit it to the fold-transcript until the server turn succeeds — so a
  // failed step can be retried without duplicating the message.
  M.thread.push({from:"supplier", text:supText, round});
  render();

  try{
    const body = {
      signed_mandate: M.signed,
      transcript: {turns: M.transcript},
      supplier_input: {mode:"bot", raw_text:supText, persona:M.form.persona},
      session_id: M.session,
    };
    const res = await post("/negotiate/step", body);
    M.transcript.push({terms:offerTerms, raw_text:supText}); // now part of the fold
    pushTurn(res.turn, round);
    M.terminal = res.terminal;
    if(res.terminal) M.status = res.turn.outcome==="accept" ? "closed" : "escalated";
  }catch(e){
    // roll the just-shown supplier message back out so a retry doesn't duplicate it
    M.thread.pop();
    if(e.code==="negotiation_closed"){ M.terminal=true; M.status="closed"; }
    else if(e.code==="offer_unparseable"){ M.error="couldn't read the supplier's price/terms — step again"; }
    else M.error = e.message;
  }finally{ M.busy=false; render(); }
}

async function autoplay(){
  while(!M.terminal && !M.error){
    await step();
    if(M.terminal||M.error) break;
    await new Promise(r=>setTimeout(r, 650));
  }
}

/* ── health ── */
async function refreshHealth(){
  try{
    const r = await fetch(API+"/health"); const h = await r.json();
    const live = r.ok && h.mandate_configured;
    setHealth(live, live ? `live · ${h.buyer_model} buyer / ${h.supplier_model} supplier` : "backend reachable, not configured");
  }catch(e){ setHealth(false, "backend unreachable — start it or check the URL"); }
}
function setHealth(live, text){
  const hs=$("#hstat"); if(hs){ hs.className="hstat"+(live?" live":""); $("#hstatText").textContent = live?"live":"offline"; }
  const mn=$("#modenote"); if(mn){ mn.className="modenote"+(live?" live":""); $("#modenoteText").textContent = text; }
}

render();
</script>
