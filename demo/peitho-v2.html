<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peitho — autonomous procurement negotiation</title>
<style>
  :root{
    --paper:#f6f4ef; --surface:#fffdf9; --surface-2:#efece4; --line:#e2ddd1;
    --ink:#1a1813; --ink-2:#57534a; --ink-3:#8c877b;
    --buyer:#2a78d6; --supplier:#c9541f; --good:#2f7d4f; --warn:#b7791f; --crit:#c4392f;
    --chart-grid:#e7e2d6; --chart-axis:#b8b2a4;
    --serif:'Iowan Old Style','Palatino Linotype','Palatino','Georgia',serif;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'SFMono-Regular',ui-monospace,'Cascadia Mono','Consolas',monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{ --paper:#14130e; --surface:#1c1a14; --surface-2:#24211a; --line:#322e25;
      --ink:#f1eee4; --ink-2:#c3bdb0; --ink-3:#8b8577;
      --buyer:#5b9cea; --supplier:#e8875a; --good:#5fc088; --warn:#e0b455; --crit:#e8776b;
      --chart-grid:#2a2720; --chart-axis:#4a463b; }
  }
  :root[data-theme="dark"]{ --paper:#14130e; --surface:#1c1a14; --surface-2:#24211a; --line:#322e25;
    --ink:#f1eee4; --ink-2:#c3bdb0; --ink-3:#8b8577;
    --buyer:#5b9cea; --supplier:#e8875a; --good:#5fc088; --warn:#e0b455; --crit:#e8776b;
    --chart-grid:#2a2720; --chart-axis:#4a463b; }
  :root[data-theme="light"]{ --paper:#f6f4ef; --surface:#fffdf9; --surface-2:#efece4; --line:#e2ddd1;
    --ink:#1a1813; --ink-2:#57534a; --ink-3:#8c877b;
    --buyer:#2a78d6; --supplier:#c9541f; --good:#2f7d4f; --warn:#b7791f; --crit:#c4392f;
    --chart-grid:#e7e2d6; --chart-axis:#b8b2a4; }

  *{box-sizing:border-box;} html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{margin:0;font-family:var(--serif);font-weight:600;letter-spacing:-.01em;text-wrap:balance;}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  button{font-family:inherit;cursor:pointer;color:inherit;}
  svg{display:inline-block;vertical-align:middle;}
  :focus-visible{outline:2px solid var(--buyer);outline-offset:2px;border-radius:5px;}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }

  /* header */
  header{display:flex;align-items:center;gap:14px;padding:13px 22px;border-bottom:1px solid var(--line);
    background:var(--surface);position:sticky;top:0;z-index:30;}
  .brand{display:flex;align-items:baseline;gap:11px;}
  .brand b{font-family:var(--serif);font-size:20px;letter-spacing:-.02em;}
  .brand span{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);letter-spacing:.03em;}
  .hspace{flex:1;}
  .hstat{font-size:11.5px;font-family:var(--mono);color:var(--ink-3);display:flex;align-items:center;gap:7px;}
  .hstat .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-3);}
  .hstat.live .dot{background:var(--good);box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 22%,transparent);}
  .iconbtn{background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;
    font-size:12.5px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;}
  .iconbtn:hover{color:var(--ink);}

  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 90px;}

  /* buttons */
  .btn{border:none;border-radius:9px;padding:9px 16px;font-size:14px;font-weight:600;
    display:inline-flex;align-items:center;gap:8px;}
  .btn.primary{background:var(--buyer);color:#fff;}
  .btn.primary:hover:not(:disabled){filter:brightness(1.07);}
  .btn.ghost{background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line);}
  .btn.ghost:hover:not(:disabled){color:var(--ink);}
  .btn:disabled{opacity:.45;cursor:default;}
  .btn.big{padding:12px 22px;font-size:15px;}

  /* ── SETUP ─────────────────────────────────────────────── */
  .setup{max-width:720px;margin:0 auto;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .setup h1{font-size:31px;line-height:1.12;margin:12px 0 14px;}
  .lede{font-size:16px;color:var(--ink-2);line-height:1.55;max-width:60ch;}
  .lede b{color:var(--ink);font-weight:600;}
  .lede-mode{display:block;margin-top:8px;font-size:13px;color:var(--warn);font-family:var(--mono);}
  .modenote{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;
    color:var(--ink-3);margin-top:16px;padding:6px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);}
  .modenote .dot{width:7px;height:7px;border-radius:50%;background:var(--warn);}
  .modenote.live .dot{background:var(--good);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px;}
  .fld{display:flex;flex-direction:column;gap:6px;} .fld.wide{grid-column:1/-1;}
  .fld label{font-size:12px;font-weight:600;color:var(--ink-2);}
  .fld label i{font-weight:400;color:var(--ink-3);font-style:normal;}
  .in{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface);
    color:var(--ink);font-size:14px;font-family:inherit;}
  .in:focus{outline:2px solid var(--buyer);outline-offset:1px;}

  .personas{display:flex;gap:10px;flex-wrap:wrap;}
  .persona{flex:1;min-width:150px;text-align:left;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:12px 14px;display:flex;flex-direction:column;gap:3px;}
  .persona b{font-size:13.5px;} .persona span{font-size:11.5px;color:var(--ink-3);}
  .persona.on{border-color:var(--supplier);background:color-mix(in srgb,var(--supplier) 10%,transparent);}
  .startrow{margin-top:26px;display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
  .startrow .meta{font-size:12.5px;color:var(--ink-3);}

  /* setup panels (emphasis / terms / supplier) */
  .panel{margin-top:20px;border:1px solid var(--line);border-radius:12px;background:var(--surface);padding:15px 18px;}
  .panel-hd{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:650;color:var(--ink);}
  .panel-hd svg{color:var(--buyer);}
  .panel-sub{font-weight:400;font-size:11.5px;color:var(--ink-3);flex-basis:100%;margin-top:3px;margin-left:24px;line-height:1.45;}
  .sliders{margin-top:12px;display:flex;flex-direction:column;gap:11px;}
  .slider{display:grid;grid-template-columns:130px 1fr 46px;gap:12px;align-items:center;}
  .slider label{font-size:12.5px;color:var(--ink-2);font-weight:600;}
  .slider .wval{text-align:right;font-size:12.5px;color:var(--buyer);font-weight:600;}
  .range{-webkit-appearance:none;appearance:none;height:5px;border-radius:3px;background:var(--surface-2);outline:none;}
  .range::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--buyer);
    cursor:pointer;border:2px solid var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .range::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--buyer);cursor:pointer;border:2px solid var(--surface);}
  .termchips{margin-top:12px;display:flex;flex-wrap:wrap;gap:9px;}
  .termchip{font-size:12.5px;padding:7px 12px;border-radius:9px;border:1px solid var(--line);
    display:inline-flex;align-items:center;gap:7px;background:var(--surface-2);color:var(--ink-2);}
  .termchip.fixed{background:color-mix(in srgb,var(--buyer) 10%,transparent);border-color:color-mix(in srgb,var(--buyer) 30%,transparent);color:var(--buyer);font-weight:600;}
  .termchip.toggle{cursor:pointer;} .termchip.toggle svg{color:var(--ink-3);}
  .termchip.toggle.on{background:color-mix(in srgb,var(--good) 12%,transparent);border-color:color-mix(in srgb,var(--good) 34%,transparent);color:var(--good);font-weight:600;}
  .termchip.toggle.on svg{color:var(--good);}
  .seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:3px;}
  .segbtn{border:none;background:none;border-radius:6px;padding:7px 14px;font-size:12.5px;color:var(--ink-2);}
  .segbtn.on{background:var(--buyer);color:#fff;font-weight:600;}

  /* contract intelligence panel */
  .intel{margin-top:20px;border:1px solid var(--line);border-radius:14px;background:var(--surface);
    padding:16px 18px;box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .intel-hd{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px;}
  .intel-hd b{font-size:15px;display:block;} .intel-hd span{font-size:12.5px;color:var(--ink-3);line-height:1.5;display:block;margin-top:2px;}
  .intel-ta{width:100%;min-height:220px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
    color:var(--ink);font-family:var(--mono);font-size:12.5px;padding:10px 12px;resize:vertical;line-height:1.5;}

  /* commercial essence — the deal at a glance, above the raw text */
  .essence{margin:2px 0 12px;border:1px solid var(--line);border-radius:12px;background:var(--surface-2);overflow:hidden;}
  .essence-hd{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--buyer) 6%,var(--surface));}
  .essence-hd svg{color:var(--buyer);flex:none;}
  .essence-hd b{font-size:13.5px;} .essence-hd .es-sup{color:var(--buyer);font-weight:600;}
  .essence-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line);}
  .es{display:flex;flex-direction:column;gap:3px;padding:11px 14px;background:var(--surface-2);}
  .esk{font-family:var(--mono);font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);}
  .esv{font-size:15px;font-weight:600;color:var(--ink);line-height:1.2;} .esv .unk{font-weight:400;color:var(--ink-3);font-size:13px;}
  .es-flag{padding:8px 14px;font-size:12px;color:var(--ink-2);border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap;}
  .es-chip{font-size:11.5px;padding:1px 8px;border-radius:999px;background:var(--surface);border:1px solid var(--line);}
  .ta-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:0 0 6px;}
  .intel-drop{margin-bottom:10px;border:1.5px dashed var(--line);border-radius:10px;background:var(--surface-2);
    padding:14px 16px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .15s,background .15s;}
  .intel-drop:hover,.intel-drop.over{border-color:var(--buyer);background:var(--surface);}
  .intel-drop svg{color:var(--buyer);flex:none;}
  .intel-drop .dz-main{font-size:13px;color:var(--ink);} .intel-drop .dz-sub{font-size:11.5px;color:var(--ink-3);display:block;margin-top:2px;}
  .intel-drop .dz-file{font-family:var(--mono);font-size:11.5px;color:var(--buyer);}
  .intel-row{display:flex;align-items:center;gap:11px;margin-top:11px;flex-wrap:wrap;}
  .intel-research{font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
  .intel-err{color:var(--crit);font-size:12.5px;}
  .spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .6s linear infinite;}
  .spin.dark{border-color:color-mix(in srgb,var(--buyer) 30%,transparent);border-top-color:var(--buyer);vertical-align:-1px;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .intel-out{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .intel-sec-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:14px 0 9px;}
  .intel-sec-lbl:first-child{margin-top:0;}
  .sec-sub{text-transform:none;letter-spacing:0;color:var(--ink-3);font-weight:400;}
  .intel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px 16px;}
  .ip{display:flex;flex-direction:column;gap:2px;font-size:12.5px;border-bottom:1px solid var(--line);padding-bottom:6px;}
  .ipk{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .ipv b{font-weight:600;} .ipv .unk{color:var(--ink-3);}
  .asr{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;}
  .asr-confirmed{background:color-mix(in srgb,var(--good) 15%,transparent);color:var(--good);}
  .asr-probable{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);}
  .asr-unknown{background:var(--surface-2);color:var(--ink-3);}
  .intel-warns{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
  .intel-warn{font-size:12.5px;color:var(--ink);padding:8px 12px;border-radius:9px;
    background:color-mix(in srgb,var(--warn) 12%,transparent);border:1px solid color-mix(in srgb,var(--warn) 40%,transparent);}
  .intel-risk{margin-top:12px;font-size:12.5px;color:var(--ink-2);display:flex;gap:10px;flex-wrap:wrap;padding:9px 12px;background:var(--surface-2);border-radius:9px;}
  .risk-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .intel-block{margin-top:12px;padding:12px 14px;border:1.5px solid var(--crit);border-radius:10px;
    background:color-mix(in srgb,var(--crit) 8%,transparent);color:var(--crit);font-size:13px;font-weight:600;}

  .adjs{display:flex;flex-direction:column;gap:8px;}
  .adj{display:flex;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);border-left:3px solid var(--line);}
  .adj-give{border-left-color:var(--good);} .adj-hold{border-left-color:var(--buyer);} .adj-hedge{border-left-color:var(--warn);}
  .adj-check{padding-top:2px;} .adj-check input{width:16px;height:16px;accent-color:var(--buyer);cursor:pointer;}
  .adj-body{flex:1;}
  .adj-top{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .adj-rule{font-family:var(--mono);font-size:11px;color:var(--ink-2);font-weight:600;}
  .adj-role{font-family:var(--mono);font-size:9.5px;padding:1px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;}
  .adj-role-give{background:color-mix(in srgb,var(--good) 15%,transparent);color:var(--good);}
  .adj-role-hold{background:color-mix(in srgb,var(--buyer) 15%,transparent);color:var(--buyer);}
  .adj-role-hedge{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);}
  .adj-rat{font-size:12.5px;color:var(--ink-2);line-height:1.5;}
  .intel-apply{margin-top:13px;display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
  .intel-apply .meta{font-size:12px;color:var(--ink-3);}
  .intel-none{margin-top:12px;font-size:12.5px;color:var(--ink-3);padding:10px 13px;background:var(--surface-2);border-radius:9px;}

  /* ── DUE-DILIGENCE COCKPIT ─────────────────────────────── */
  /* severity + status color tokens (semantic, separate from the buyer/supplier accents) */
  .sev-critical{--sev:var(--crit);} .sev-high{--sev:var(--warn);}
  .sev-medium{--sev:var(--buyer);} .sev-low{--sev:var(--ink-3);}

  .cx-hd{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .cx-hd h2{font-size:22px;}
  .cx-file{font-family:var(--mono);font-size:12px;color:var(--ink-2);}
  .cx-meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);}
  .cx-example{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 8px;border-radius:5px;background:color-mix(in srgb,var(--buyer) 12%,transparent);color:var(--buyer);}
  .cx-sub{font-size:12.5px;color:var(--ink-3);margin:0 0 16px;line-height:1.5;}

  /* the legal-review gate banner — shows its RULE, not just a conclusion */
  .gate{display:flex;gap:13px;align-items:flex-start;padding:13px 16px;border-radius:12px;margin-bottom:18px;
    border:1px solid color-mix(in srgb,var(--crit) 40%,transparent);background:color-mix(in srgb,var(--crit) 8%,transparent);}
  .gate.ok{border-color:color-mix(in srgb,var(--good) 40%,transparent);background:color-mix(in srgb,var(--good) 8%,transparent);}
  .gate svg{flex:none;color:var(--crit);margin-top:1px;} .gate.ok svg{color:var(--good);}
  .gate-body{flex:1;}
  .gate-title{font-weight:600;font-size:14px;color:var(--ink);}
  .gate-rule{font-size:12.5px;color:var(--ink-2);margin-top:2px;}
  .gate-owner{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:4px;}
  .gate-counts{display:flex;gap:8px;flex:none;align-items:center;}
  .cx-pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;
    background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);white-space:nowrap;}
  .cx-pill.critical{background:color-mix(in srgb,var(--crit) 14%,transparent);color:var(--crit);border-color:transparent;}
  .cx-pill.high{background:color-mix(in srgb,var(--warn) 16%,transparent);color:var(--warn);border-color:transparent;}
  .cx-pill.medium{background:color-mix(in srgb,var(--buyer) 14%,transparent);color:var(--buyer);border-color:transparent;}

  /* tabs: risk review / commercial */
  .cx-tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--line);}
  .cx-tab{background:none;border:none;padding:8px 14px;font-size:13.5px;font-weight:600;color:var(--ink-3);
    border-bottom:2px solid transparent;margin-bottom:-1px;}
  .cx-tab.on{color:var(--ink);border-bottom-color:var(--buyer);}

  /* two-pane layout: cards left, evidence right */
  .cx-split{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:18px;align-items:start;}
  @media (max-width:900px){ .cx-split{grid-template-columns:1fr;} }

  .cx-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .cx-chip{font-size:12px;padding:4px 11px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);}
  .cx-chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .cx-cards{display:flex;flex-direction:column;gap:10px;}
  .rcard{border:1px solid var(--line);border-left:3px solid var(--sev,var(--ink-3));border-radius:11px;
    background:var(--surface);padding:12px 14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .rcard:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);}
  .rcard.sel{border-color:var(--buyer);box-shadow:0 0 0 2px color-mix(in srgb,var(--buyer) 25%,transparent);}
  .rcard.unver{border-left-style:dashed;opacity:.9;}
  .rcard-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .rsev{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:2px 7px;border-radius:5px;background:color-mix(in srgb,var(--sev) 16%,transparent);color:var(--sev);}
  .rcat{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);}
  .rcard-sp{flex:1;}
  .ranchor{font-family:var(--mono);font-size:11px;color:var(--buyer);display:inline-flex;align-items:center;gap:4px;
    padding:2px 7px;border-radius:5px;background:color-mix(in srgb,var(--buyer) 10%,transparent);border:none;}
  .ranchor:hover{background:color-mix(in srgb,var(--buyer) 20%,transparent);}
  .rverify{font-family:var(--mono);font-size:10px;display:inline-flex;align-items:center;gap:3px;}
  .rverify.ok{color:var(--good);} .rverify.no{color:var(--warn);}
  .rcard-title{font-weight:600;font-size:13.5px;line-height:1.35;}
  .rcard-hurts{font-size:12.5px;color:var(--ink-2);line-height:1.5;margin-top:5px;}
  .rraise{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);margin-top:6px;}
  .rraise b{color:var(--warn);font-weight:600;}
  .rpos{margin-top:8px;font-size:12px;display:flex;flex-direction:column;gap:3px;}
  .rpos-line{display:flex;gap:7px;} .rpos-k{color:var(--good);font-weight:600;flex:none;} .rpos-v{color:var(--ink-2);}

  /* evidence pane — the in-tool document viewer */
  .evid{border:1px solid var(--line);border-radius:12px;background:var(--surface);position:sticky;top:78px;overflow:hidden;}
  .evid-hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--surface-2);}
  .evid-hd .evid-doc{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);}
  .evid-hd .evid-nav{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .evid-scroll{max-height:560px;overflow-y:auto;padding:0 4px;background:var(--paper);}
  .evid-page{margin:12px 8px;background:var(--surface);border:1px solid var(--line);border-radius:8px;
    box-shadow:0 1px 4px rgba(0,0,0,.05);padding:16px 18px;}
  .evid-pagenum{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-3);margin-bottom:10px;text-align:right;}
  .evid-block{font-size:12.5px;line-height:1.6;color:var(--ink-2);padding:6px 8px;border-radius:6px;white-space:pre-wrap;
    scroll-margin-top:60px;transition:background .3s;}
  .evid-block:first-line{font-weight:600;}
  .evid-block.flash{background:color-mix(in srgb,var(--warn) 26%,transparent);}
  .evid-block.risk{border-left:2px solid var(--sev,var(--warn));background:color-mix(in srgb,var(--sev,var(--warn)) 7%,transparent);}
  .evid-empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-size:13px;}

  /* commercial / economics tab */
  .econ-hero{display:flex;gap:22px;flex-wrap:wrap;padding:16px 18px;border:1px solid var(--line);border-radius:12px;
    background:var(--surface);margin-bottom:16px;}
  .econ-stat{display:flex;flex-direction:column;gap:3px;}
  .econ-stat .k{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);}
  .econ-stat .v{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--ink);}
  .econ-sec{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin:18px 0 9px;}
  .econ-buildup{display:flex;flex-direction:column;gap:1px;background:var(--line);border-radius:10px;overflow:hidden;border:1px solid var(--line);}
  .econ-row{display:flex;align-items:baseline;gap:12px;padding:10px 14px;background:var(--surface);}
  .econ-row .lbl{flex:1;font-size:13px;color:var(--ink);} .econ-row .note{font-size:11.5px;color:var(--ink-3);}
  .econ-row .amt{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ink);}
  .econ-row.total{background:var(--surface-2);} .econ-row.total .lbl{font-weight:600;}
  .erisk{display:flex;gap:12px;padding:12px 14px;border:1px solid var(--line);border-left:3px solid var(--sev,var(--ink-3));
    border-radius:10px;background:var(--surface);margin-bottom:9px;}
  .erisk-body{flex:1;} .erisk-top{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
  .erisk-lbl{font-weight:600;font-size:13px;} .erisk-detail{font-size:12.5px;color:var(--ink-2);line-height:1.5;}
  .erisk-lever{font-size:12px;color:var(--good);margin-top:6px;} .erisk-lever b{font-weight:600;}

  /* Ask-Opus box */
  .ask{border:1px solid var(--line);border-radius:12px;background:var(--surface);margin-top:18px;overflow:hidden;}
  .ask-hd{padding:11px 15px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;background:var(--surface-2);}
  .ask-hd b{font-size:13.5px;} .ask-hd .ask-model{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-left:auto;}
  .ask-thread{max-height:280px;overflow-y:auto;padding:14px 15px;display:flex;flex-direction:column;gap:12px;}
  .ask-empty{color:var(--ink-3);font-size:12.5px;line-height:1.6;}
  .ask-q{align-self:flex-end;max-width:82%;background:color-mix(in srgb,var(--buyer) 12%,transparent);
    color:var(--ink);padding:8px 12px;border-radius:11px 11px 3px 11px;font-size:13px;}
  .ask-a{align-self:flex-start;max-width:88%;font-size:13px;color:var(--ink);line-height:1.55;}
  .ask-a .ask-cite{font-family:var(--mono);font-size:10.5px;color:var(--buyer);background:color-mix(in srgb,var(--buyer) 10%,transparent);
    padding:1px 6px;border-radius:4px;border:none;margin:0 2px;}
  .ask-locked{padding:16px;font-size:12.5px;color:var(--ink-2);line-height:1.6;background:var(--surface-2);}
  .ask-form{display:flex;gap:9px;padding:12px 15px;border-top:1px solid var(--line);}
  .ask-in{flex:1;border:1px solid var(--line);border-radius:9px;background:var(--surface-2);color:var(--ink);
    font-family:inherit;font-size:13px;padding:9px 12px;}
  .cx-back{background:none;border:none;font-size:12.5px;color:var(--ink-3);display:inline-flex;align-items:center;gap:5px;margin-bottom:14px;}
  .cx-back:hover{color:var(--ink);}

  /* ── MANDATE CARD ──────────────────────────────────────── */
  .mandate{border:1px solid var(--line);border-radius:14px;background:var(--surface);
    box-shadow:0 1px 0 rgba(0,0,0,.02);overflow:hidden;margin-bottom:22px;}
  .mandate .seal{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--buyer) 6%,transparent),transparent);}
  .mandate .seal .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);}
  .mandate .seal h3{font-size:16px;}
  .mandate .body{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px 26px;}
  .mrow{display:flex;flex-direction:column;gap:3px;}
  .mrow .k{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);}
  .mrow .v{font-size:14px;font-weight:600;}
  .mrow .v .mono{font-weight:600;}
  .emphasis{display:flex;gap:5px;align-items:center;margin-top:3px;}
  .edot{width:8px;height:8px;border-radius:50%;background:var(--line);}
  .edot.on{background:var(--buyer);}
  .mfoot{grid-column:1/-1;border-top:1px solid var(--line);padding-top:12px;display:flex;
    justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;
    font-family:var(--mono);font-size:11px;color:var(--ink-3);}
  .mfoot .sig{color:var(--ink-2);}

  /* ── RUN transport + tabs ──────────────────────────────── */
  .transport{display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap;}
  .tabs{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px;}
  .tab{border:none;background:none;border-radius:7px;padding:7px 13px;font-size:12.5px;color:var(--ink-2);
    display:inline-flex;align-items:center;gap:6px;}
  .tab.on{background:var(--surface);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .turnhint{font-size:12px;font-family:var(--mono);color:var(--ink-3);margin-left:auto;}
  .turnhint.err{color:var(--crit);}

  /* panes */
  .stage{display:grid;grid-template-columns:1fr 300px;gap:16px;}
  @media(max-width:820px){.stage{grid-template-columns:1fr;}}
  .thread-wrap{border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden;
    display:flex;flex-direction:column;min-height:440px;}
  .thread-head{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--surface-2);
    display:flex;align-items:center;gap:10px;}
  .thread-head .who{font-weight:650;font-size:14px;}
  .thread-head .tag{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 8px;border-radius:5px;}
  .thread-head .sub{font-size:11.5px;color:var(--ink-3);margin-left:auto;}
  .thread{padding:6px 18px 18px;overflow-y:auto;max-height:560px;flex:1;}
  .empty{color:var(--ink-3);text-align:center;padding:60px 20px;font-size:14px;}

  /* email message */
  .msg{padding:16px 0;border-bottom:1px solid var(--line);}
  .msg:last-child{border-bottom:none;}
  .msg-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .avatar{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
  .avatar.buyer{background:var(--buyer);} .avatar.supplier{background:var(--supplier);}
  .msg-from{font-weight:650;font-size:13.5px;}
  .msg-meta{font-size:11.5px;color:var(--ink-3);font-family:var(--mono);}
  .msg-body{border-left:3px solid var(--line);padding:2px 0 2px 15px;margin-left:8px;
    white-space:pre-wrap;font-size:14px;color:var(--ink);line-height:1.6;}
  .msg.buyer .msg-body{border-left-color:var(--buyer);}
  .msg.supplier .msg-body{border-left-color:var(--supplier);}
  .msg-sig{margin-top:9px;padding-left:23px;font-size:11.5px;color:var(--ink-3);font-style:italic;}

  .skel{padding:16px 0;border-bottom:1px solid var(--line);}
  .skel .line{height:11px;border-radius:4px;background:linear-gradient(90deg,var(--surface-2),var(--line),var(--surface-2));
    background-size:200% 100%;animation:shimmer 1.3s infinite;margin:8px 0;}
  @keyframes shimmer{to{background-position:-200% 0;}}

  /* reasoning drawer */
  .drawer{margin:10px 0 2px 23px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);overflow:hidden;}
  .drawer summary{list-style:none;cursor:pointer;padding:9px 13px;font-size:12px;font-family:var(--mono);
    color:var(--ink-2);display:flex;align-items:center;gap:8px;}
  .drawer summary::-webkit-details-marker{display:none;}
  .drawer summary .chev{transition:transform .15s;}
  .drawer[open] summary .chev{transform:rotate(90deg);}
  .drawer .content{padding:0 13px 13px;}
  .dsec{border-top:1px solid var(--line);padding:11px 0;}
  .dsec:first-child{border-top:none;}
  .dsec .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px;}
  .drow{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
  .drow .mono{color:var(--ink);}
  .trade{font-size:12.5px;color:var(--ink-2);line-height:1.5;}
  .bars{margin-top:9px;display:flex;flex-direction:column;gap:6px;}
  .bar{display:grid;grid-template-columns:96px 1fr auto;gap:9px;align-items:center;font-size:11.5px;}
  .bar .track{height:6px;background:var(--surface);border-radius:4px;overflow:hidden;}
  .bar .fill{height:100%;background:var(--buyer);border-radius:4px;}
  .chips{margin-top:9px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .chip{font-family:var(--mono);font-size:11px;background:color-mix(in srgb,var(--buyer) 14%,transparent);
    color:var(--buyer);padding:2px 8px;border-radius:5px;}
  .chiplbl{font-family:var(--mono);font-size:10.5px;color:var(--ink-3);}

  /* consulted knowledge base — the KB made visible, like give/get */
  .kbchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .kbchip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:6px;
    background:color-mix(in srgb,var(--accent,#7c5cff) 10%,transparent);
    color:color-mix(in srgb,var(--accent,#7c5cff) 78%,var(--ink));
    border:1px solid color-mix(in srgb,var(--accent,#7c5cff) 26%,transparent);}
  .kbchip svg{opacity:.8;}
  .kbnote{font-size:11px;color:var(--ink-3);margin-top:7px;line-height:1.45;}

  /* negotiation prep — auto-detected category + tone + coverage gap */
  .prep-chips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .prep-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:6px;
    font-family:var(--mono);border:1px solid var(--line);color:var(--ink-2);}
  .prep-chip.ok{background:color-mix(in srgb,var(--good) 11%,transparent);border-color:color-mix(in srgb,var(--good) 30%,transparent);color:color-mix(in srgb,var(--good) 80%,var(--ink));}
  .prep-chip.unk{background:color-mix(in srgb,var(--warn) 11%,transparent);border-color:color-mix(in srgb,var(--warn) 30%,transparent);color:color-mix(in srgb,var(--warn) 82%,var(--ink));}
  .prep-chip.tone{background:color-mix(in srgb,var(--buyer) 10%,transparent);border-color:color-mix(in srgb,var(--buyer) 26%,transparent);color:color-mix(in srgb,var(--buyer) 80%,var(--ink));}
  .prep-gap{margin-top:8px;font-size:11.5px;color:color-mix(in srgb,var(--warn) 85%,var(--ink));display:flex;align-items:center;gap:7px;line-height:1.45;}

  /* give/get — the collaborative trade, visible on the counter itself */
  .giveget{margin:9px 0 2px 23px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
  .gg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 10px;border-radius:7px;
    border:1px solid transparent;}
  .gg .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;}
  .gg .v{font-family:var(--mono);}
  .gg.give{background:color-mix(in srgb,var(--good) 10%,transparent);color:var(--good);
    border-color:color-mix(in srgb,var(--good) 28%,transparent);}
  .gg.get{background:color-mix(in srgb,var(--buyer) 11%,transparent);color:var(--buyer);
    border-color:color-mix(in srgb,var(--buyer) 28%,transparent);}
  .gg-arrow{color:var(--ink-3);font-size:12px;}

  /* the guard hero */
  .guard-ok{margin-top:4px;font-size:12px;color:var(--good);display:flex;align-items:center;gap:7px;}
  .guard-reject{margin-top:4px;}
  .rej-draft{font-size:12.5px;color:var(--ink-3);text-decoration:line-through;
    text-decoration-color:var(--crit);text-decoration-thickness:1.5px;padding:8px 11px;
    background:color-mix(in srgb,var(--crit) 7%,transparent);border:1px solid color-mix(in srgb,var(--crit) 24%,transparent);
    border-radius:8px;line-height:1.5;position:relative;}
  .rej-verdict{font-family:var(--mono);font-size:11px;color:var(--crit);margin:7px 0;display:flex;align-items:center;gap:7px;}
  .rej-verdict .tok{background:color-mix(in srgb,var(--crit) 16%,transparent);padding:1px 6px;border-radius:4px;}
  .rej-arrow{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin:2px 0;}
  .sent-draft{font-size:12.5px;color:var(--ink);padding:8px 11px;background:color-mix(in srgb,var(--good) 8%,transparent);
    border:1px solid color-mix(in srgb,var(--good) 26%,transparent);border-radius:8px;line-height:1.5;}

  /* sidebar */
  .side{display:flex;flex-direction:column;gap:16px;}
  .card{border:1px solid var(--line);border-radius:14px;background:var(--surface);padding:15px 17px;}
  .card h3{font-size:13px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);
    font-weight:400;margin-bottom:12px;}
  .redact-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line);}
  .redact-row:last-child{border-bottom:none;}
  .redact-row .dots{font-family:var(--mono);color:var(--ink-3);letter-spacing:2px;}
  .redact-note{font-size:11.5px;color:var(--ink-3);margin-top:11px;line-height:1.5;}

  /* convergence chart */
  .chart-note{font-size:11.5px;color:var(--ink-3);margin-top:9px;line-height:1.45;}
  .legend{display:flex;gap:14px;margin-top:10px;font-size:11.5px;}
  .legend i{width:18px;height:3px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle;}

  /* banner */
  .banner{margin-top:18px;padding:16px 20px;border:1.5px solid var(--good);border-radius:14px;background:var(--surface);
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .banner.escalated{border-color:var(--warn);}
  .banner .t{font-family:var(--serif);font-size:17px;font-weight:600;}
  .banner .d{font-size:13px;color:var(--ink-2);}

  /* composer */
  .composer{border-top:1px solid var(--line);padding:12px 14px;background:var(--surface-2);
    display:flex;flex-direction:column;gap:9px;}
  .composer .clab{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--ink-3);display:flex;justify-content:space-between;}
  .composer textarea{width:100%;min-height:60px;border:1px solid var(--line);border-radius:9px;
    background:var(--surface);color:var(--ink);font-family:inherit;font-size:13.5px;padding:9px 11px;resize:vertical;}
  .composer .crow{display:flex;gap:9px;align-items:center;}
  .composer .hint{font-size:11px;color:var(--ink-3);flex:1;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);
    padding:10px 18px;border-radius:10px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:100;
    opacity:0;pointer-events:none;transition:opacity .2s;}
  .toast.show{opacity:1;}
</style>

<header>
  <button class="brand" id="homeBtn" style="background:none;border:none;padding:0;">

<div class="wrap" id="app"></div>

<script>
"use strict";
/* ══ Peitho v2 — thin client over the live deterministic backend ══════════
   The browser holds NO engine. It sends the signed mandate + transcript to
   /negotiate/open and /step; the server decides, drafts, guards, and returns
   the buyer message + reasoning. Every number on screen is server-computed. */

const $ = (s,r=document)=>r.querySelector(s);
const esc = s => String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Same-origin when served from the backend; falls back to the deployed URL when
// opened as a local file so the demo works either way.
const API = (location.protocol === "file:" || !location.host)
  ? "https://web-production-a5b7b.up.railway.app"
  : "";

const PERSONAS = [
  {id:"cooperative", label:"Cooperative", hint:"concedes early, seeks a fair middle"},
  {id:"aggressive", label:"Aggressive",  hint:"holds firm, concedes late"},
  {id:"evasive",    label:"Evasive",     hint:"stalls, defers, avoids numbers"},
];

const TERM_LABELS = {price:"Unit price", payment_days:"Payment terms", contract_months:"Contract length",
  rebate_pct:"Rebate %", volume_units:"Annual volume"};
function fmtTerm(name, x){
  if(x==null) return "—";
  if(name==="price") return "€"+Number(x).toFixed(2);
  if(name==="payment_days") return "net-"+Math.round(x);
  if(name==="contract_months") return Math.round(x)+" mo";
  if(name==="rebate_pct") return Number(x).toFixed(1)+"%";
  if(name==="volume_units") return Math.round(x).toLocaleString('en')+" units";
  return String(x);
}

const M = {
  phase:"setup",
  form:{
    supplier:"Nordwerk Verpackung GmbH", category:"Corrugated packaging — annual supply",
    supplierContact:"", buyerSignature:"Procurement Team",
    target:92, floor:108, paymentLever:60, contractMax:24, persona:"aggressive",
    // editable weights (emphasis) — 0..100 each; normalised across ENABLED terms only
    wPrice:50, wPayment:25, wContract:25, wRebate:20, wVolume:20,
    // optional terms off by default
    rebateOn:false, volumeOn:false,
    // supplier controls
    supplierOpen:109, concession:"medium",  // slow | medium | fast
  },
  session:null, signed:null, transcript:[], thread:[], turns:[],
  tab:"buyer", busy:false, status:"live", terminal:false, error:null, convergence:[],
  // contract intelligence — `filename` is the uploaded file's name (display only)
  intel:{ open:false, busy:false, text:"", filename:"", result:null, accepted:{}, error:null, applied:false },
  // due-diligence cockpit — the risk dossier, filters, and the in-tool Ask-Opus thread
  cockpit:{ busy:false, error:null, scanError:null, data:null, catFilter:"all", sevFilter:"all",
    selected:null, chat:[], asking:false, tab:"risk" },
  // setup fields the human has hand-edited — auto-fill from a contract must never clobber these
  touched:new Set(),
};

// Every negotiable term the demo can put on the table. `weightKey` maps to M.form.
const TERM_DEFS = [
  {name:"price", type:"price", dir:"minimize", label:"Unit price", weightKey:"wPrice", always:true,
    best:f=>+f.target, worst:f=>+f.floor, appetite:0.15},
  {name:"payment_days", type:"payment_days", dir:"maximize", label:"Payment terms", weightKey:"wPayment", always:true,
    best:f=>+f.paymentLever, worst:()=>30, appetite:0.85},
  {name:"contract_months", type:"contract_months", dir:"minimize", label:"Contract length", weightKey:"wContract", always:true,
    best:()=>12, worst:f=>+f.contractMax, appetite:0.70},
  {name:"rebate_pct", type:"rebate_pct", dir:"maximize", label:"Rebate %", weightKey:"wRebate", toggle:"rebateOn",
    best:()=>8, worst:()=>0, appetite:0.55},
  {name:"volume_units", type:"volume_units", dir:"minimize", label:"Annual volume", weightKey:"wVolume", toggle:"volumeOn",
    best:()=>10000, worst:()=>50000, appetite:0.60},
];
function activeTerms(){ return TERM_DEFS.filter(t => t.always || M.form[t.toggle]); }

/* ── backend calls ── */
// God-view (the buyer-internal drawer) is unlocked only by the server-side PEITHO_GODVIEW_TOKEN.
// Pass it in the URL fragment for LOCAL dev: peitho-v2.html#gv=<token>. On the public deploy no
// token is set, so this header matches nothing and the reservation floor never leaks.
function godviewToken(){
  const m = (location.hash||"").match(/(?:^|[#&])gv=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : "";
}
// FULL mode (Opus writes the buyer prose, Haiku plays supplier, live Hades research) is
// unlocked only by the server-side PEITHO_FULL_TOKEN, passed in the URL fragment:
// peitho-v2.html#full=<token>. Without it the public/portfolio version runs the real engine
// with TEMPLATED messages and no research — genuinely interactive, and $0 to run.
function fullToken(){
  const m = (location.hash||"").match(/(?:^|[#&])full=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : "";
}
function authHeaders(){
  return {"X-Peitho-Godview":godviewToken(), "X-Peitho-Full":fullToken()};
}
async function post(path, body){
  const r = await fetch(API+path, {
    method:"POST", headers:{"Content-Type":"application/json", ...authHeaders()},
    body:JSON.stringify(body),
  });
  const data = await r.json().catch(()=>({error:{code:"bad_response",message:"unreadable response"}}));
  if(!r.ok) throw Object.assign(new Error(data?.error?.message||"request failed"), {code:data?.error?.code, status:r.status});
  return data;
}

// Signal for the server to auto-detect the procurement category — the uploaded contract
// text if any, plus the category label from the form. No human picks a category.
function negotiationContext(){
  const f = M.form;
  const contractText = (M.intel && M.intel.text) ? M.intel.text : "";
  return { contract_text: contractText, category_hint: f.category || "" };
}

// Who the buyer letter is addressed to and signed by — drives the salutation + sign-off.
function correspondents(){
  const f = M.form;
  return {
    supplier_name: f.supplier || "",
    supplier_contact: (f.supplierContact || "").trim(),
    buyer_signature: (f.buyerSignature || "").trim() || "Procurement Team",
  };
}

function buildMandate(){
  const f = M.form;
  const terms = activeTerms();
  const rawSum = terms.reduce((s,t)=>s + Math.max(0.01, +f[t.weightKey]), 0);
  const envTerms = terms.map(t=>({
    name:t.name, term_type:t.type, direction:t.dir,
    best:t.best(f), worst:t.worst(f),
    weight: Math.max(0.01, +f[t.weightKey]) / rawSum,   // normalised across active terms
  }));
  const appetite = {}; terms.forEach(t=>appetite[t.name]=t.appetite);
  return {
    envelope:{
      negotiation_id:"neg-"+M.session, version:1, signed_by:"e.mueller (demo)",
      target_utility:(M.shapedTarget??0.90), reservation_utility:(M.shapedReservation??0.60), terms:envTerms,
    },
    supplier_appetite:appetite,
    config:{max_rounds:6, beta:2.5, stall_rounds:3, on_unknown_terms:"escalate"},
  };
}
function normalizedWeights(){
  const f=M.form, terms=activeTerms();
  const raw = terms.reduce((s,t)=>s+Math.max(0.01,+f[t.weightKey]),0);
  return Object.fromEntries(terms.map(t=>[t.name, Math.max(0.01,+f[t.weightKey])/raw]));
}

/* scripted supplier that concedes by persona — the browser plays the counterparty
   so the demo is self-contained; the ENGINE (buyer) is the real thing on the server.
   Returns {text, terms} so step() uses the exact offer, not a brittle re-parse. */
function supplierMove(persona, round){
  const f = M.form;
  // concession pace blends the persona with the user's chosen pace
  const paceMul = {slow:0.6, medium:1.0, fast:1.5}[f.concession] ?? 1.0;
  const speed = ({cooperative:0.42, aggressive:0.20, evasive:0.28}[persona]) * paceMul;
  const frac = Math.min(1, speed*(round+1));

  // price: opens at supplierOpen, concedes toward the buyer's target (won't go below)
  const pOpen = +f.supplierOpen, pFloor = +f.target;
  const price = Math.round(Math.max(pFloor, pOpen - (pOpen-pFloor)*frac)*100)/100;
  // payment: cooperative extends toward the lever; others hold near net-30
  const pay = persona==="cooperative" ? Math.min(45+round*4, +f.paymentLever) : (persona==="evasive"?30:30);
  // contract: cooperative shortens toward 12; others hold the max
  const con = persona==="cooperative" ? Math.max(12, +f.contractMax-round*3) : +f.contractMax;

  const terms = {price, payment_days:pay, contract_months:con};
  // optional terms, if enabled — supplier gives ground slowly
  if(f.rebateOn) terms.rebate_pct = Math.round(Math.min(8, frac*4)*10)/10;
  if(f.volumeOn) terms.volume_units = Math.round(Math.max(10000, 50000 - frac*40000));

  // build a message that states every ACTIVE term in extractor-safe phrasing
  // (space before "months"; "net-N"; "N%"; "N units") so the server parses a full offer.
  const parts = [`€${price.toFixed(2)} per unit`, `net-${pay}`, `${con} months`];
  if(f.rebateOn) parts.push(`${terms.rebate_pct}% rebate`);
  if(f.volumeOn) parts.push(`${terms.volume_units.toLocaleString('en')} units`);
  const list = parts.slice(0,-1).join(", ")+", and "+parts.slice(-1);
  const lead = {
    cooperative:"Appreciate the dialogue — to keep this moving I can come to",
    aggressive:"I hear you, but this is about as far as I can stretch:",
    evasive:"Let me take this back to my team — provisionally I could look at",
  }[persona];
  const tail = {cooperative:" Let's find the middle here.", aggressive:" Margins are thin.", evasive:", though I'd want to confirm internally."}[persona];
  return { text:`${lead} ${list}.${tail}`, terms };
}

/* ══ RENDER ══════════════════════════════════════════════════════════════ */
const app = $("#app");
function render(){
  app.innerHTML = M.phase==="cockpit" ? cockpitView() : M.phase==="setup" ? setupView() : runView();
  if(M.phase==="cockpit") bindCockpit();
  else if(M.phase==="setup") bindSetup();
  else bindRun();
  for(const id of ["threadBuyer","threadSupplier"]){ const el=$("#"+id); if(el) el.scrollTop=el.scrollHeight; }
}

/* theme */
(function(){ const mq=matchMedia("(prefers-color-scheme: dark)");
  let t = mq.matches?"dark":"light";
  const ap=x=>document.documentElement.setAttribute("data-theme",x);
  ap(t);
  $("#themeBtn").onclick=()=>{ t=(document.documentElement.getAttribute("data-theme")==="dark")?"light":"dark"; ap(t); };
})();
$("#homeBtn").onclick=()=>{ if(M.phase!=="setup"){ M.phase="setup"; render(); } };

/* ── setup view ── */
function setupView(){
  const f=M.form;
  return `<div class="setup">
    <div class="eyebrow">the deterministic negotiator</div>
    <h1>The model advises. The engine decides.</h1>
    <p class="lede">A real procurement negotiation runs on the server: a deterministic engine
      makes every accept / counter / walk-away call and fixes the exact figures a reply may state.
      The message layer — <b>whether templated or written by a language model</b> — <b>cannot state a
      number the engine didn't approve</b>. You watch it happen, including the moment the guard
      rejects a draft. <span class="lede-mode" id="ledeMode"></span></p>
    <div class="modenote" id="modenote"><span class="dot"></span><span id="modenoteText">checking backend…</span></div>

    ${sectionIntel()}

      ${field("Target price (€/unit)","the aspiration",`<input class="in" type="number" step="0.5" id="f-target" value="${f.target}">`)}
      ${field("Walk-away floor (€/unit)","never cross this",`<input class="in" type="number" step="0.5" id="f-floor" value="${f.floor}">`)}
      ${field("Payment lever (max net-days)","a term to trade",`<input class="in" type="number" id="f-paymentLever" value="${f.paymentLever}">`)}
      ${field("Max contract length (months)","",`<input class="in" type="number" id="f-contractMax" value="${f.contractMax}">`)}
    </div>

    ${sectionEmphasis()}
    ${sectionTerms()}
    ${sectionSupplier()}

    <div class="startrow">
      <button class="btn primary big" id="startBtn"><svg width="16" height="16"><use href="#i-seal"/></svg> Sign the mandate &amp; open</button>
      <span class="meta">target €${(+f.target).toFixed(2)} · floor €${(+f.floor).toFixed(2)} · ${activeTerms().length} terms on the table</span>
    </div>
  </div>`;
}

function sectionIntel(){
  const it=M.intel;
  const sample = `SUPPLY AGREEMENT

Supplier: Nordwerk Verpackung GmbH
Category: Corrugated packaging

1. Price. The unit price shall be €11.50 per unit.
2. Payment. Invoices are payable net-30 days.
3. Term. This agreement expires 2026-08-15 unless renewed.
4. Volume. Minimum annual volume: 40,000 units.
5. Confidentiality. Both parties enter a mutual non-disclosure agreement.`;

      <div><b>Walk in prepared</b>
        <span>Upload or paste the current/expiring contract — the agent extracts the deal, auto-fills the provider, researches the supplier, and proposes how the intelligence should shape your mandate. You approve every change.</span></div>
    </div>
    <label class="intel-drop${it.busy?" over":""}" id="intelDrop">
      <svg width="20" height="20"><use href="#i-seal"/></svg>
      <div>${it.busy
        ? `<span class="dz-main"><span class="spin dark"></span> Extracting text…</span><span class="dz-sub">reading the contract's text layer</span>`
        : it.filename
        ? `<span class="dz-main">Loaded <span class="dz-file">${esc(it.filename)}</span></span><span class="dz-sub">click or drop another file to replace it</span>`
        : `<span class="dz-main">Drop a contract file here, or click to choose</span><span class="dz-sub">PDF · Word .docx · .txt · .md · .csv — scanned/image PDFs have no text to read</span>`}</div>
      <input type="file" id="intelFile" accept=".pdf,.docx,.txt,.md,.markdown,.csv,.text,application/pdf,text/plain" hidden>
    </label>
    ${it.result?intelEssence(it.result):""}
    ${it.result?`<div class="ta-lbl">contract text — the agent read all of this</div>`:""}
    <textarea class="intel-ta" id="intelText" placeholder="…or paste contract text here">${esc(it.text)}</textarea>
    <div class="intel-row">
      <button class="btn primary" id="intelReadBtn" ${it.busy?"disabled":""}>${it.busy?'<span class="spin"></span> Reading…':'📄 Read the contract'}</button>
      <button class="btn ghost" id="intelSampleBtn">load a sample</button>
      <button class="btn ghost" id="cockpitBtn"><svg width="14" height="14"><use href="#i-shield"/></svg> Due-diligence example</button>
      <label class="intel-research"><input type="checkbox" id="intelResearch" checked> research supplier (Hades)</label>
      ${it.error?`<span class="intel-err">⚠ ${esc(it.error)}</span>`:""}
    </div>
    ${it.result?intelResult(it.result):""}
    <input type="hidden" id="intelSample" value="${esc(sample).replace(/"/g,'&quot;')}">
  </div>`;
}

// The commercial essence of the contract, at a glance — supplier + the numbers that drive the
// mandate, shown ABOVE the raw text so a buyer reads the deal instantly, not by scrolling clauses.
function intelEssence(r){
  const i=r.intelligence, ext=i.extraction, life=i.lifecycle||{}, legal=i.legal||{};
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  const num=(v,fmt)=> v!=null ? `<span class="esv">${fmt?fmt(v):esc(String(v))}</span>` : `<span class="esv"><span class="unk">not detected</span></span>`;
  const cells = [
    ["Unit price", terms.price!=null?`€${(+terms.price).toFixed(2)}`:null],
    ["Payment", terms.payment_days!=null?`net-${terms.payment_days}`:null],
    ["Volume", terms.volume_units!=null?`${(+terms.volume_units).toLocaleString('en')} u`:null],
    ["Rebate", terms.rebate_pct!=null?`${(+terms.rebate_pct).toFixed(1)}%`:null],
    ["Expiry", life.expiration_date&&life.expiration_date.value!=null?esc(String(life.expiration_date.value)):null],
  ];
  const chips=[];
  if(legal.has_nda&&legal.has_nda.value==="true") chips.push("NDA in place");
  if(legal.has_dpa&&legal.has_dpa.value==="true") chips.push("DPA in place");
  if(life.auto_renews&&life.auto_renews.value==="true") chips.push("⚠ auto-renews");
  if(ext.category) chips.push(esc(ext.category));
  const supplier = ext.supplier_name ? `<span class="es-sup">${esc(ext.supplier_name)}</span>` : `<span class="unk">supplier not detected</span>`;
  return `<div class="essence">
    <div class="essence-hd"><svg width="15" height="15"><use href="#i-seal"/></svg>
      <b>Negotiating with ${supplier}</b></div>
    <div class="essence-grid">
      ${cells.map(([k,v])=>`<div class="es"><span class="esk">${k}</span>${num(v)}</div>`).join("")}
    </div>
    ${chips.length?`<div class="es-flag">${chips.map(c=>`<span class="es-chip">${c}</span>`).join("")}</div>`:""}
  </div>`;
}

function intelResult(r){
  const i=r.intelligence, ext=i.extraction;
  const life=i.lifecycle||{};
  const legal=i.legal||{};
  const grounded=(g,fmt)=> g&&g.value!=null ? `<b>${esc(fmt?fmt(g.value):g.value)}</b> <span class="asr asr-${g.assurance}">${g.assurance}</span>` : `<span class="unk">not detected</span>`;
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  const pic = [
    ["Supplier", ext.supplier_name?`<b>${esc(ext.supplier_name)}</b>`:`<span class="unk">—</span>`],
    ["Unit price", terms.price!=null?`<b>€${(+terms.price).toFixed(2)}</b>`:`<span class="unk">—</span>`],
    ["Payment", terms.payment_days!=null?`<b>net-${terms.payment_days}</b>`:`<span class="unk">—</span>`],
    ["Volume", terms.volume_units!=null?`<b>${(+terms.volume_units).toLocaleString('en')} units</b>`:`<span class="unk">—</span>`],
    ["Expiry", grounded(life.expiration_date)],
    ["NDA", grounded(legal.has_nda, v=>v==="true"?"in place ✓":"none")],
    ["DPA", grounded(legal.has_dpa, v=>v==="true"?"in place ✓":"none")],
    ["Units", i.units_of_measure&&i.units_of_measure.length?`<b>${i.units_of_measure.map(esc).join(", ")}</b>`:`<span class="unk">—</span>`],
  ];
  const brief=r.brief;
  const riskRow = brief ? `<div class="intel-risk">
    <span class="risk-lbl">Supplier risk (${brief.source==="sample"?"sample — not live":"Hades"})</span>
    <span>${esc(brief.risk_level||"—")} · ${esc(brief.recommendation||"—")} · sanctions ${brief.sanctioned?"⚠ match":"clear ✓"} · LkSG ${esc((brief.lksg_signal||"—").replace(/_/g," "))}</span>
  </div>` : (r.research_note?`<div class="intel-risk"><span class="risk-lbl">Supplier risk</span><span>${esc(r.research_note)}</span></div>`:"");

  const blocked = r.blocked ? `<div class="intel-block">⛔ ${esc(r.block_reason||"Supplier blocked — a human must clear this.")}</div>` : "";

  // extraction warnings (truncation, no terms, no supplier) — surfaced, never silent
  const warns=(i.warnings||[]);
  const warnRow = warns.length ? `<div class="intel-warns">${warns.map(w=>`<div class="intel-warn">⚠ ${esc(w)}</div>`).join("")}</div>` : "";

  const adj = (r.adjustments||[]).map(a=>{
    const acc = M.intel.accepted[a.rule_id] !== false; // default accepted
    return `<div class="adj adj-${a.role}">
      <label class="adj-check"><input type="checkbox" data-rule="${esc(a.rule_id)}" ${acc?"checked":""} ${r.blocked?"disabled":""}></label>
      <div class="adj-body">
        <div class="adj-top"><span class="adj-rule">${esc(a.rule_id)}</span>
          <span class="adj-role adj-role-${a.role}">${a.role}</span></div>
        <div class="adj-rat">${esc(a.rationale)}</div>
      </div>
    </div>`;
  }).join("");

  return `<div class="intel-out">
    <div class="intel-sec-lbl">the commercial picture</div>
    <div class="intel-grid">${pic.map(([k,v])=>`<div class="ip"><span class="ipk">${k}</span><span class="ipv">${v}</span></div>`).join("")}</div>
    ${warnRow}
    ${riskRow}
    ${blocked}
    ${(r.adjustments&&r.adjustments.length)?`<div class="intel-sec-lbl">proposed mandate adjustments <span class="sec-sub">the model found it · a rule moved it · you approve it</span></div>
      <div class="adjs">${adj}</div>
      <div class="intel-apply">
        <button class="btn primary" id="intelApplyBtn" ${r.blocked?"disabled":""}>Apply to mandate ↓</button>
        <span class="meta">${r.blocked?"cleared by a human before this unlocks":"writes the shaped target/floor/terms into the form below"}</span>
      </div>` : `<div class="intel-none">No mandate adjustments proposed — the contract looks clean. The extracted numbers are pre-filled below.</div>`}
  </div>`;
}

function sectionEmphasis(){
  const f=M.form, terms=activeTerms();
  const nw = normalizedWeights();
  return `<div class="panel">
    <div class="panel-hd"><svg width="15" height="15"><use href="#i-scale"/></svg> Emphasis
      <span class="panel-sub">how much the buyer weights each term — this is what drives logrolling. Normalised automatically.</span></div>
    <div class="sliders">
      ${terms.map(t=>`<div class="slider">
        <label>${esc(t.label)}</label>
        <input type="range" min="1" max="100" value="${f[t.weightKey]}" data-w="${t.weightKey}" class="range">
        <span class="mono wval">${Math.round(nw[t.name]*100)}%</span>
      </div>`).join("")}
    </div>
  </div>`;
}

function sectionTerms(){
  const f=M.form;
  const opt = TERM_DEFS.filter(t=>t.toggle);

function bindIntel(){
  const ta=$("#intelText"); if(ta) ta.oninput=()=>{ M.intel.text=ta.value; M.intel.filename=""; };
  const sb=$("#intelSampleBtn"); if(sb) sb.onclick=()=>{ M.intel.text=$("#intelSample").value; M.intel.filename=""; render(); };
  const cb=$("#cockpitBtn"); if(cb) cb.onclick=openCockpit;
  const rb=$("#intelReadBtn"); if(rb) rb.onclick=readContract;
  // upload: file picker + drag-drop, both feed the same readFileIntoIntel path
  const fi=$("#intelFile"); if(fi) fi.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(f) readFileIntoIntel(f); };
  const dz=$("#intelDrop");
  if(dz){
    const stop=e=>{ e.preventDefault(); e.stopPropagation(); };
    dz.addEventListener("dragover",e=>{ stop(e); dz.classList.add("over"); });
    dz.addEventListener("dragleave",e=>{ stop(e); dz.classList.remove("over"); });
    dz.addEventListener("drop",e=>{ stop(e); dz.classList.remove("over"); const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) readFileIntoIntel(f); });
  }
  // adjustment toggles → re-preview is deferred until "Apply"; just track acceptance
  app.querySelectorAll(".adj-check input").forEach(c=>c.onchange=()=>{ M.intel.accepted[c.dataset.rule]=c.checked; });
  const ab=$("#intelApplyBtn"); if(ab) ab.onclick=applyIntel;
}

// A dropped/selected file → the intel textarea. PDF and Word .docx are parsed to text
// server-side (/extract-text); plain text is read in-browser. A scanned PDF (no text
// layer) or corrupt file comes back as an honest error, never a silent empty box.
function readFileIntoIntel(file){
  const MAX=20*1024*1024; // 20 MB file cap — a big export is bulky even though its TEXT is small
  if(file.size>MAX){ M.intel.error=`${file.name} is too large (${(file.size/1048576).toFixed(1)} MB) — max 20 MB`; M.intel.filename=""; render(); return; }
  const name=(file.name||"").toLowerCase();
  if(/\.(pdf|docx)$/.test(name)) return extractFileServerSide(file);
  // plain text: read in the browser, no round-trip
  const reader=new FileReader();
  reader.onerror=()=>{ M.intel.error=`couldn't read ${file.name}`; render(); };
  reader.onload=()=>{
    const text=String(reader.result||"");
    if(/\x00/.test(text.slice(0,4096))){  // a NUL byte means it's binary despite the extension
      M.intel.error=`${file.name} looks binary, not text — open it and paste the text below`;
      M.intel.filename=""; render(); return;
    }
    M.intel.text=text; M.intel.filename=file.name; M.intel.error=null; M.intel.result=null; M.intel.accepted={};
    render();
  };
  reader.readAsText(file);
}

// Upload a PDF/DOCX to the backend, which extracts the text layer and returns it. The
// text then flows into the same intel path a paste takes.
async function extractFileServerSide(file){
  M.intel.busy=true; M.intel.error=null; M.intel.result=null; M.intel.filename=""; render();
  try{
    const fd=new FormData(); fd.append("file", file, file.name);
    const r=await fetch(API+"/extract-text", {method:"POST", headers:authHeaders(), body:fd});
    const data=await r.json().catch(()=>({error:{code:"bad_response",message:"unreadable response"}}));
    if(!r.ok) throw new Error(data?.error?.message||"couldn't read the file");
    M.intel.text=data.text||""; M.intel.filename=file.name; M.intel.accepted={};
    // surface a truncation warning honestly — a >2 MB-text read is never reported as complete
    M.intel.error = data.truncated ? `⚠ ${data.warning||"the document was truncated for analysis"}` : null;
  }catch(e){ M.intel.error=e.message||`couldn't read ${file.name}`; }
  finally{ M.intel.busy=false; render(); }
}

async function readContract(){
  const text=(M.intel.text||"").trim();
  if(!text){ M.intel.error="upload or paste a contract first"; render(); return; }
  M.intel.busy=true; M.intel.error=null; M.intel.result=null; M.intel.accepted={}; render();
  try{
    const research=$("#intelResearch") ? $("#intelResearch").checked : true;
    const res=await post("/intel", {contract_text:text, research});
    M.intel.result=res;
    // negotiate WITH this provider: fill supplier + extracted numbers into the form as soon
    // as the contract is read, so the sample defaults never linger. M.touched guards hand-edits.
    fillFormFromExtraction(res);
  }catch(e){ M.intel.error=e.message||"couldn't read the contract"; }
  finally{ M.intel.busy=false; render(); }
}

// Fill the supplier + negotiable numbers from a just-read contract, never clobbering a value
// the human hand-typed (M.touched guards that). Runs on "Read the contract"; the later
// "Apply to mandate" step layers the shaped weights/target/floor on top via writeShapedIntoForm.
function fillFormFromExtraction(r){
  const i=r&&r.intelligence; const ext=i&&i.extraction; if(!ext) return;
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  if(ext.supplier_name && !M.touched.has("supplier")) M.form.supplier=ext.supplier_name;
  if(ext.category && !M.touched.has("category")) M.form.category=ext.category;
  if(terms.price!=null){
    if(!M.touched.has("supplierOpen")) M.form.supplierOpen=+terms.price;
    if(!M.touched.has("target")) M.form.target=+terms.price;
    if(!M.touched.has("floor")) M.form.floor=Math.round((+terms.price*1.17)*100)/100;
  }
  if(terms.payment_days!=null && !M.touched.has("paymentLever"))
    M.form.paymentLever=Math.max(+M.form.paymentLever, +terms.payment_days);
}

async function applyIntel(){
  const r=M.intel.result; if(!r || r.blocked) return;
  // build the current base envelope from the form, then reshape server-side
  const base=buildMandate().envelope;
  const accepted=(r.adjustments||[]).filter(a=>M.intel.accepted[a.rule_id]!==false).map(a=>a.rule_id);
  try{
    const res=await post("/reshape", {
      base_envelope:base, adjustments:r.adjustments,
      accepted_rule_ids:accepted, supplier_appetite:buildMandate().supplier_appetite,
    });
    writeShapedIntoForm(res.shaped_envelope, r);
    M.intel.applied=true;
    render();
    const el=document.querySelector(".grid"); if(el) el.scrollIntoView({behavior:"smooth"});
  }catch(e){
    M.intel.error = e.code==="mandate_conflict"
      ? "Those adjustments conflict — deselect one: "+(e.message||"")
      : (e.message||"couldn't apply");
    render();
  }
}

// map the server's shaped envelope back into the editable form (levers + emphasis + floors)
function writeShapedIntoForm(env, r){
  const i=r.intelligence, ext=i.extraction;
  const terms=Object.fromEntries((ext.terms||[]).map(t=>[t.name,t.value]));
  // negotiate WITH this provider: fill the supplier and their opening price from the
  // contract, but never clobber a value the human hand-typed (M.touched guards that).
  if(ext.supplier_name && !M.touched.has("supplier")) M.form.supplier=ext.supplier_name;
  if(terms.price!=null && !M.touched.has("supplierOpen")) M.form.supplierOpen=+terms.price;
  // pre-fill the negotiable numbers from the extracted contract
  if(terms.price!=null){ M.form.target=+terms.price; M.form.floor=Math.round((+terms.price*1.17)*100)/100; }
  if(terms.payment_days!=null) M.form.paymentLever=Math.max(M.form.paymentLever, +terms.payment_days);
  // enable optional terms the shaper added, set weights from the shaped envelope
  const byName=Object.fromEntries(env.terms.map(t=>[t.name,t]));
  if(byName.rebate_pct) M.form.rebateOn=true;
  if(byName.volume_units) M.form.volumeOn=true;
  const total=env.terms.reduce((s,t)=>s+t.weight,0);
  const setW=(name,key)=>{ if(byName[name]) M.form[key]=Math.round(byName[name].weight/total*100); };
  setW("price","wPrice"); setW("payment_days","wPayment"); setW("contract_months","wContract");
  setW("rebate_pct","wRebate"); setW("volume_units","wVolume");
  // the data-driven target/floor from the shaped mandate (replaces the hardcoded 0.9/0.6)
  M.shapedTarget=env.target_utility; M.shapedReservation=env.reservation_utility;
}

/* ══ DUE-DILIGENCE COCKPIT ═══════════════════════════════════════════════ */
const SEV_RANK={critical:3,high:2,medium:1,low:0};
const CAT_LABEL={legal:"Legal",gdpr:"GDPR",infosec:"InfoSec",coc:"CoC",commercial:"Commercial"};

async function openCockpit(){
  M.phase="cockpit"; M.cockpit.busy=true; M.cockpit.error=null; render();
  try{
    const r=await fetch(API+"/dossier",{headers:authHeaders()});
    const data=await r.json().catch(()=>({error:{code:"bad",message:"unreadable response"}}));
    if(!r.ok) throw new Error(data?.error?.message||"couldn't load the dossier");
    M.cockpit.data=data;
    // preselect the highest-severity finding so the evidence pane isn't empty
    const anchored=data.findings.filter(f=>f.verified);
    anchored.sort((a,b)=>SEV_RANK[b.severity]-SEV_RANK[a.severity]);
    M.cockpit.selected=anchored.length?anchored[0].anchor_id:null;
  }catch(e){ M.cockpit.error=e.message||"couldn't load the dossier"; }
  finally{ M.cockpit.busy=false; render(); }
}

// Live scan of an uploaded contract — full mode only (the demo shows an honest note). POSTs the
// PDF to /dossier/scan; the backend runs LLM extraction through the SAME anchor+gate pipeline and
// returns the same dossier shape, which drops straight into the cockpit view.
function scanOwnContract(){
  if(!fullToken()){
    M.cockpit.scanError="Live scanning of your own contract runs Claude and is available in the full version only. This example is the real engine on a bundled contract — $0.";
    render(); return;
  }
  const inp=$("#cxScanFile"); if(inp) inp.click();
}

async function runLiveScan(file){
  if(!file) return;
  if(!/\.pdf$/i.test(file.name)){ M.cockpit.scanError="Upload a text-based PDF to scan."; render(); return; }
  M.cockpit.busy=true; M.cockpit.scanError=null; M.cockpit.error=null; render();
  try{
    const fd=new FormData(); fd.append("file", file, file.name);
    const r=await fetch(API+"/dossier/scan",{method:"POST",headers:authHeaders(),body:fd});
    const data=await r.json().catch(()=>({error:{code:"bad",message:"unreadable response"}}));
    if(!r.ok) throw new Error(data?.error?.message||"the scan failed");
    M.cockpit.data=data.dossier;
    M.cockpit.chat=[];  // fresh chat context for the new contract
    const anchored=data.dossier.findings.filter(f=>f.verified);
    anchored.sort((a,b)=>SEV_RANK[b.severity]-SEV_RANK[a.severity]);
    M.cockpit.selected=anchored.length?anchored[0].anchor_id:null;
  }catch(e){ M.cockpit.scanError=e.message||"the scan failed"; }
  finally{ M.cockpit.busy=false; render(); }
}

function riskTab(d){
  const c=M.cockpit;
  const cats=["all",...Object.keys(CAT_LABEL).filter(k=>d.findings.some(f=>f.category===k))];
  const sevs=["all","critical","high","medium"];
  const catChips=cats.map(k=>`<button class="cx-chip${c.catFilter===k?" on":""}" data-cat="${k}">${k==="all"?"All":CAT_LABEL[k]||k}</button>`).join("");
  const sevChips=sevs.map(s=>`<button class="cx-chip${c.sevFilter===s?" on":""}" data-sev="${s}">${s==="all"?"All severities":s}</button>`).join("");
  let list=d.findings.filter(f=>(c.catFilter==="all"||f.category===c.catFilter)&&(c.sevFilter==="all"||f.severity===c.sevFilter));
  list.sort((a,b)=>SEV_RANK[b.severity]-SEV_RANK[a.severity]);
  const cards=list.map(riskCard).join("")||`<div class="intel-none">No findings match this filter.</div>`;
  return `<div class="cx-split">
    <div>
      <div class="cx-filters">${catChips}</div>
      <div class="cx-filters">${sevChips}</div>
      <div class="cx-cards">${cards}</div>
    </div>
    ${evidencePane(d)}
  </div>`;
}

function evidencePane(d){
  const c=M.cockpit;
  const byPage={};
  d.blocks.forEach(b=>{ (byPage[b.page_display]=byPage[b.page_display]||[]).push(b); });
  // which anchors are risk-bearing, and at what severity, so the viewer can tint them
  const riskBy={};
  d.findings.forEach(f=>{ if(f.verified&&f.anchor_id) riskBy[f.anchor_id]=f.severity; });
  const pages=Object.keys(byPage).map(Number).sort((a,b)=>a-b).map(p=>`
    <div class="evid-page">
      <div class="evid-pagenum">Page ${p} of ${d.page_count}</div>
      ${byPage[p].map(b=>{
        const sev=riskBy[b.anchor_id];
        const cls=sev?`evid-block risk sev-${sev}`:"evid-block";
        return `<div class="${cls}" id="ev-${esc(b.anchor_id)}">${esc(b.text)}</div>`;
      }).join("")}
    </div>`).join("");
  return `<div class="evid">
    <div class="evid-hd"><svg width="14" height="14" style="color:var(--buyer)"><use href="#i-book"/></svg>
      <span class="evid-doc">${esc(d.doc_title)}</span>

  </div>`;
}

}

function askOpusBox(){
  const c=M.cockpit;
  const full=!!fullToken();
  const model=full?"Opus 4.8":"full version only";
  let body;
  if(!full){
    body=`<div class="ask-locked">In the <b>full version</b>, this box asks <b>Opus 4.8</b> about the legal and economic risks in this contract — grounded in the anchored passages above, and every answer cites the clause it came from. The public demo keeps this off so it costs nothing to run.</div>`;
  } else {
    const thread=c.chat.length?c.chat.map(m=>m.role==="q"

      : `<div class="ask-a">${m.html}</div>`).join("")
      : `<div class="ask-empty">Ask about any legal or economic risk — e.g. “How bad is the liability cap?” or “What does the CPU+3% indexation cost us over the term?” Answers are grounded in the clauses above.</div>`;
    body=`<div class="ask-thread" id="askThread">${thread}</div>

function jumpToAnchor(anchorId){
  if(!anchorId) return;
  M.cockpit.selected=anchorId;
  const el=$("#ev-"+CSS.escape(anchorId));
  if(el){
    el.scrollIntoView({behavior:"smooth",block:"center"});
    el.classList.remove("flash"); void el.offsetWidth; el.classList.add("flash");
    setTimeout(()=>el.classList.remove("flash"),1400);
  }
  // update card selection styling without a full re-render (keeps scroll position)
  document.querySelectorAll(".rcard").forEach(card=>card.classList.toggle("sel", card.getAttribute("data-jump")===anchorId));
}

function bindCockpit(){
  const back=$("#cxBack"); if(back) back.onclick=()=>{ M.phase="setup"; render(); };
  document.querySelectorAll("[data-cxtab]").forEach(b=>b.onclick=()=>{ M.cockpit.tab=b.getAttribute("data-cxtab"); render(); });
  document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{ M.cockpit.catFilter=b.getAttribute("data-cat"); render(); });
  document.querySelectorAll("[data-sev]").forEach(b=>b.onclick=()=>{ M.cockpit.sevFilter=b.getAttribute("data-sev"); render(); });
  // clicking a card (or its anchor chip) jumps the evidence pane
  document.querySelectorAll("[data-jump]").forEach(el=>el.addEventListener("click",e=>{ e.stopPropagation(); jumpToAnchor(el.getAttribute("data-jump")); }));
  const form=$("#askForm"); if(form) form.onsubmit=e=>{ e.preventDefault(); askOpus(); };
  const scanBtn=$("#cxScanBtn"); if(scanBtn) scanBtn.onclick=scanOwnContract;
  const scanFile=$("#cxScanFile"); if(scanFile) scanFile.onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(f) runLiveScan(f); };
}

async function askOpus(){
  const inp=$("#askIn"); if(!inp) return;
  const q=inp.value.trim(); if(!q||M.cockpit.asking) return;
  M.cockpit.chat.push({role:"q",text:q});
  M.cockpit.asking=true; render();
  try{
    const r=await fetch(API+"/dossier/ask",{method:"POST",headers:{...authHeaders(),"Content-Type":"application/json"},body:JSON.stringify({question:q})});
    const data=await r.json().catch(()=>({error:{code:"bad",message:"unreadable response"}}));
    if(!r.ok) throw new Error(data?.error?.message||"couldn't get an answer");
    M.cockpit.chat.push({role:"a",html:renderAnswer(data)});
  }catch(e){ M.cockpit.chat.push({role:"a",html:`<span style="color:var(--crit)">⚠ ${esc(e.message||"couldn't get an answer")}</span>`}); }
  finally{ M.cockpit.asking=false; render(); }
}

// render an answer, turning [p2-b1] anchor refs into clickable chips that jump the viewer
function renderAnswer(data){
  const text=esc(data.answer||"");
  return text.replace(/\[([a-z]?\d+-b\d+)\]/g,(m,a)=>`<button class="ask-cite" data-jump="${a}">${a}</button>`);
}
