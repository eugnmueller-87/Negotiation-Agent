name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The engine is pure Python; prove it on both OSes (the CLI has
        # Windows-specific stdout handling) and every supported minor.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: mypy

      - name: Test + coverage gate
        run: pytest --cov=negotiation_agent --cov-report=term-missing --cov-fail-under=90

  # A single required check to gate merges regardless of matrix size.
  ci-ok:
    name: CI passed
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all matrix jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "matrix job failed"; exit 1
          fi
